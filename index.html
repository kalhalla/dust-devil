    return `<svg viewBox="0 0 100 140" preserveAspectRatio="xMidYMid meet">
      <ellipse cx="50" cy="33" rx="20" ry="24" fill="${fill}"/>
      <rect x="32" y="55" width="36" height="55" rx="5" fill="${fill}"/>
      <rect x="18" y="58" width="13" height="42" rx="4" fill="${fill}" transform="rotate(-12 24 80)"/>
      <rect x="69" y="58" width="13" height="42" rx="4" fill="${fill}" transform="rotate(12 76 80)"/>
      <rect x="34" y="108" width="12" height="28" rx="3" fill="${fill}"/>
      <rect x="54" y="108" width="12" height="28" rx="3" fill="${fill}"/>
      <circle cx="42" cy="30" r="3" fill="${eye}"/>
      <circle cx="58" cy="30" r="3" fill="${eye}"/>
      <rect x="43" y="42" width="14" height="3" fill="#000" opacity="0.6"/>
    </svg>`;
  } else if (bounty.base === 'bomber') {
    return `<svg viewBox="0 0 100 140" preserveAspectRatio="xMidYMid meet">
      <ellipse cx="50" cy="80" rx="38" ry="34" fill="${fill}"/>
      <ellipse cx="50" cy="33" rx="16" ry="18" fill="${fill}"/>
      <circle cx="50" cy="33" r="5" fill="${eye}"/>
      <circle cx="28" cy="72" r="9" fill="${eye}" opacity="0.7"/>
      <circle cx="72" cy="78" r="11" fill="${eye}" opacity="0.7"/>
      <circle cx="50" cy="100" r="9" fill="${eye}" opacity="0.7"/>
      <circle cx="64" cy="60" r="6" fill="${eye}" opacity="0.6"/>
      <rect x="36" y="118" width="10" height="20" rx="3" fill="${fill}"/>
      <rect x="54" y="118" width="10" height="20" rx="3" fill="${fill}"/>
    </svg>`;
  } else { // brute
    return `<svg viewBox="0 0 100 140" preserveAspectRatio="xMidYMid meet">
      <ellipse cx="50" cy="28" rx="13" ry="15" fill="${fill}"/>
      <rect x="28" y="42" width="44" height="55" rx="4" fill="${fill}"/>
      <ellipse cx="82" cy="62" rx="14" ry="22" fill="${fill}"/>
      <circle cx="84" cy="86" r="13" fill="${fill}"/>
      <rect x="20" y="48" width="9" height="32" rx="3" fill="${fill}"/>
      <rect x="34" y="98" width="11" height="30" rx="3" fill="${fill}"/>
      <rect x="55" y="98" width="11" height="30" rx="3" fill="${fill}"/>
      <circle cx="44" cy="26" r="2.5" fill="${eye}"/>
      <circle cx="56" cy="26" r="2.5" fill="${eye}"/>
    </svg>`;
  }
}

function showWantedPoster(bounty) {
  const el = document.getElementById('wanted-poster');
  const portraitBg = colorToCSS(bounty.color);
  el.innerHTML = `
    <div class="wanted-header">WANTED</div>
    <div class="wanted-status">— DEAD OR ALIVE —</div>
    <div class="wanted-portrait" style="background: radial-gradient(circle at 50% 40%, ${portraitBg} 0%, #4a3a2a 75%);">
      ${getBountySilhouette(bounty)}
    </div>
    <div class="wanted-name">${bounty.name}</div>
    <div class="wanted-crime">"${bounty.crime}"</div>
    <div class="wanted-reward">$${bounty.value}</div>
    <div class="wanted-stamp">WASTELAND<br>MARSHAL</div>
  `;
  el.classList.remove('show');
  void el.offsetWidth;
  el.classList.add('show');
  // freeze enemy action while the poster reads (poster is visible ~3.5s)
  game.wantedShown = true;
  game.wantedTimer = 3.5;
}

function showBountyClaim(bounty) {
  const el = document.getElementById('bounty-claim');
  el.innerHTML = `
    <div class="bc-tag">★ BOUNTY CLAIMED ★</div>
    <div class="bc-name">${bounty.name}</div>
    <div class="bc-value">+ $${bounty.value}</div>
  `;
  el.classList.remove('show');
  void el.offsetWidth;
  el.classList.add('show');
}

// ==================== GAME FLOW ====================
function startGame() {
  game.state = 'playing';
  game.paused = false;
  game.hp = 100;
  game.score = 0;
  game.wave = 1;
  game.bountiesClaimed.clear();
  game.pendingBounty = null;
  game.bountyAlive = false;
  game.wantedShown = false;
  game.wantedTimer = 0;
  game.pickups.forEach(p => scene.remove(p.mesh));
  game.pickups = [];
  game.enemies.forEach(e => scene.remove(e.mesh));
  game.enemies = [];
  vex.position.set(0,0,0);
  vex.visible = true;
  weapon.pistolAmmo = PISTOL_AMMO_START;
  setWeapon('pistols');
  // reset truck
  player.inVehicle = false;
  truckState.position.copy(truckSpawn);
  truckState.heading = -Math.PI / 4;
  truckState.speed = 0;
  truckState.steer = 0;
  truckState.occupied = false;
  truckState.mesh.position.copy(truckState.position);
  truckState.mesh.rotation.y = truckState.heading;
  truckState.headlights.forEach(h => h.intensity = 0);
  document.getElementById('title-screen').style.display = 'none';
  document.getElementById('gameover').style.display = 'none';
  document.getElementById('wanted-poster').classList.remove('show');
  document.getElementById('bounty-claim').classList.remove('show');
  pauseOverlay.classList.remove('show');
  weaponBar.classList.add('show');
  speedometer.classList.remove('show');
  interactBtn.classList.remove('show');
  if (!isTouch) document.getElementById('crosshair').style.display = 'block';
  if (isTouch) {
    pauseBtn.classList.add('show');
    document.getElementById('shoot-btn').classList.add('show');
  }
  releaseAllButtons();
  startWave();
  updateHUD();
  updateWeaponBar();
  clock.getDelta();
}

function gameOver() {
  game.state = 'dead';
  document.getElementById('final-score').textContent = `$${game.score}`;
  // assemble bounty summary
  let rows = '';
  let total = 0;
  game.bountiesClaimed.forEach(id => {
    const b = bountyRoster.find(x => x.id === id);
    if (b) {
      rows += `<div class="bs-row">★ <span class="bs-name">${b.name}</span><span class="bs-val">$${b.value}</span></div>`;
      total += b.value;
    }
  });
  const summaryEl = document.getElementById('bounty-summary');
  if (rows) {
    summaryEl.innerHTML = `<div class="bs-header">BOUNTIES CLAIMED</div>${rows}<div class="bs-total">BOUNTY TOTAL: $${total}</div>`;
  } else {
    summaryEl.innerHTML = `<div class="bs-empty">No bounties claimed.</div>`;
  }
  document.getElementById('gameover').style.display = 'flex';
  document.getElementById('crosshair').style.display = 'none';
  document.getElementById('wanted-poster').classList.remove('show');
  document.getElementById('bounty-claim').classList.remove('show');
  pauseBtn.classList.remove('show');
  weaponBar.classList.remove('show');
  document.getElementById('shoot-btn').classList.remove('show');
  interactBtn.classList.remove('show');
  speedometer.classList.remove('show');
  if (player.inVehicle) {
    player.inVehicle = false;
    truckState.occupied = false;
    truckState.headlights.forEach(h => h.intensity = 0);
    vex.visible = true;
  }
  releaseAllButtons();
  game.pickups.forEach(p => scene.remove(p.mesh));
  game.pickups = [];
  game.wantedShown = false;
  targetMarker.visible = false;
}

document.getElementById('start-btn').onclick = startGame;
document.getElementById('restart-btn').onclick = startGame;

// ==================== UPDATE LOOP ====================
const clock = new THREE.Clock();

function update(dt) {
  if (game.state !== 'playing') return;
  if (game.paused) return;

  // combine input sources for shooting (suppressed while in vehicle)
  game.shooting = (mouseDown || btnState.shoot) && !player.inVehicle;

  updateMouseWorld();

  // ===== driving branch =====
  if (player.inVehicle) {
    updateTruck(dt);
    updateInteractPrompt();
    // skip the foot-movement / weapon / aim block; jump to enemies + effects + camera below
    // (we still tick enemies, effects, etc. — handled by the rest of update())
  } else {

  // ---- vex movement ----
  let inputX = 0, inputZ = 0;
  let sprint = keys['ShiftLeft'] || keys['ShiftRight'];

  if (touchState.left.active) {
    // analog floating joystick
    inputX = touchState.left.dx / JOY_MAX_R;
    inputZ = touchState.left.dy / JOY_MAX_R;
    const jmag = Math.hypot(inputX, inputZ);
    if (jmag > 0.85) sprint = true;
    if (jmag > 1) { inputX /= jmag; inputZ /= jmag; }
  } else {
    if (keys['KeyW']) inputZ -= 1;
    if (keys['KeyS']) inputZ += 1;
    if (keys['KeyA']) inputX -= 1;
    if (keys['KeyD']) inputX += 1;
    const mag = Math.hypot(inputX, inputZ);
    if (mag > 1) { inputX /= mag; inputZ /= mag; }
  }

  // touch users get a single comfortable speed (no shift key)
  const speed = sprint ? 9 : (isTouch ? 7.5 : 6);
  const inputMag = Math.hypot(inputX, inputZ);

  if (inputMag > 0.05) {
    vex.position.x += inputX * speed * dt;
    vex.position.z += inputZ * speed * dt;
    game.walkPhase += dt * (sprint ? 18 : 12);
  } else {
    game.walkPhase *= 0.85;
  }

  // clamp inside play area
  const dist = Math.hypot(vex.position.x, vex.position.z);
  if (dist > PLAY_RADIUS - 1) {
    const k = (PLAY_RADIUS - 1) / dist;
    vex.position.x *= k;
    vex.position.z *= k;
  }
  resolveCollision(vex.position, 0.55);

  // ---- aim ----
  // touch: auto-aim to nearest enemy when shooting; else face movement direction
  // desktop: aim from mouse (already set by updateMouseWorld)
  let autoTarget = null;
  if (isTouch) {
    if (game.shooting && game.enemies.length > 0) {
      let minDist = Infinity;
      for (const e of game.enemies) {
        const d = e.mesh.position.distanceTo(vex.position);
        if (d < minDist) { minDist = d; autoTarget = e; }
      }
      if (autoTarget) {
        game.mouseWorld.copy(autoTarget.mesh.position);
        game.mouseWorld.y = 0;
      }
    } else if (inputMag > 0.15) {
      // not aiming — face movement direction
      game.mouseWorld.set(vex.position.x + inputX * 5, 0, vex.position.z + inputZ * 5);
    }
    // else: keep last facing
  }

  // target marker
  if (autoTarget) {
    targetMarker.position.copy(autoTarget.mesh.position);
    targetMarker.position.y = 0.05;
    targetMarker.visible = true;
    const k = 1 + Math.sin(performance.now() * 0.012) * 0.18;
    targetMarker.scale.setScalar(k);
  } else {
    targetMarker.visible = false;
  }

  // face the aim
  const aimDir = new THREE.Vector3().subVectors(game.mouseWorld, vex.position);
  game.vexFacing = Math.atan2(aimDir.x, aimDir.z);
  vex.rotation.y = game.vexFacing;

  // body bob, walk anim
  vex.userData.bodyG.position.y = 0.95 + Math.abs(Math.sin(game.walkPhase)) * 0.05;
  vex.userData.legL.rotation.x = Math.sin(game.walkPhase) * 0.6;
  vex.userData.legR.rotation.x = -Math.sin(game.walkPhase) * 0.6;

  // ---- weapon firing ----
  weapon.shootCD -= dt;

  if (weapon.current === 'pistols') {
    if (game.shooting && weapon.shootCD <= 0 && weapon.pistolAmmo > 0) {
      firePistol();
      weapon.pistolAmmo--;
      weapon.shootCD = 0.09;
      updateWeaponBar();
    }
    // pistol flash decay
    pistolL.userData.flash.material.opacity = Math.max(0, pistolL.userData.flash.material.opacity - dt * 12);
    pistolR.userData.flash.material.opacity = Math.max(0, pistolR.userData.flash.material.opacity - dt * 12);
  } else if (weapon.current === 'minigun') {
    if (game.shooting && !weapon.minigunOverheated) {
      weapon.minigunSpinup = Math.min(1, weapon.minigunSpinup + dt / 0.5);
      weapon.minigunHeat = Math.min(1, weapon.minigunHeat + dt / 4.5);
      if (weapon.minigunHeat >= 1) {
        weapon.minigunOverheated = true;
        spawnSmoke(getMuzzleWorld(minigun));
      }
      if (weapon.minigunSpinup >= 1) {
        if (weapon.shootCD <= 0) {
          fireMinigun();
          weapon.shootCD = 0.04;
        }
      }
    } else {
      weapon.minigunSpinup = Math.max(0, weapon.minigunSpinup - dt / 0.7);
      weapon.minigunHeat = Math.max(0, weapon.minigunHeat - dt / 5);
      if (weapon.minigunOverheated && weapon.minigunHeat < 0.4) {
        weapon.minigunOverheated = false;
      }
    }
    // rotate barrels at speed
    if (minigun.userData.barrels) {
      minigun.userData.barrels.rotation.z += weapon.minigunSpinup * dt * 30;
    }
    // heat glow
    minigun.userData.heatGlow.material.opacity = weapon.minigunHeat * 0.6;
    // muzzle flash decay
    minigun.userData.flash.material.opacity = Math.max(0, minigun.userData.flash.material.opacity - dt * 12);
    // heat overlay UI
    const heatFill = document.getElementById('heat-fill');
    if (heatFill) heatFill.style.width = (weapon.minigunHeat * 100) + '%';
    // weapon button heat overlay
    const minBtn = document.querySelector('.weapon-btn[data-weapon="minigun"]');
    minBtn.querySelector('.heat-overlay').style.height = (weapon.minigunHeat * 100) + '%';
    minBtn.classList.toggle('overheat', weapon.minigunOverheated);
  } else if (weapon.current === 'sword') {
    if (game.shooting && weapon.shootCD <= 0) {
      swingSword();
      weapon.shootCD = 0.55;
    }
    weapon.swordSwingTime -= dt;
    // sword swing animation - swing arm forward
    if (weapon.swordSwingTime > 0) {
      const t = 1 - weapon.swordSwingTime / 0.3;
      const swing = Math.sin(t * Math.PI);
      vex.userData.armR.rotation.y = -1.2 * swing;
      vex.userData.armR.rotation.x = -0.5 - swing * 0.5;
    } else {
      vex.userData.armR.rotation.y *= 0.85;
      vex.userData.armR.rotation.x = -0.5;
    }
  }

  // close the on-foot branch
  updateInteractPrompt();
  } // end if (!player.inVehicle)

  // ---- enemy spawning ----
  if (game.enemiesToSpawn > 0) {
    game.spawnTimer -= dt;
    if (game.spawnTimer <= 0) {
      spawnEnemy();
      game.enemiesToSpawn--;
      game.spawnTimer = 0.6 + Math.random()*0.6;
    }
  } else if (game.enemies.length === 0) {
    game.wave++;
    startWave();
    updateHUD();
  }

  // ---- wanted poster freeze timer ----
  if (game.wantedShown) {
    game.wantedTimer -= dt;
    if (game.wantedTimer <= 0) game.wantedShown = false;
  }

  // ---- enemy update ----
  for (const e of game.enemies) {
    // truck splatter — always runs, even with poster up (lets you keep splatting)
    if (player.inVehicle) {
      const tdx = e.mesh.position.x - truckState.position.x;
      const tdz = e.mesh.position.z - truckState.position.z;
      const td = Math.hypot(tdx, tdz);
      if (td < 2.5 && td > 0.01) {
        const truckSpeed = Math.abs(truckState.speed);
        e.truckHitCD = (e.truckHitCD || 0) - dt;
        if (truckSpeed > 2 && td < 1.9 && e.truckHitCD <= 0) {
          const dmg = truckSpeed * 3;
          e.hp -= dmg;
          e.hitFlash = 0.25;
          e.truckHitCD = 0.2;
          spawnHitSpark(e.mesh.position.clone().setY(1));
          if (truckSpeed > 6) spawnDeathBurst(e.mesh.position.clone().setY(1));
          game.shakeIntensity = Math.max(game.shakeIntensity, 0.15 + truckSpeed * 0.018);
          if (e.hp <= 0) {
            killEnemy(e);
            continue;
          }
        }
        const push = (2.5 - td) * 12;
        e.mesh.position.x += (tdx / td) * push * dt;
        e.mesh.position.z += (tdz / td) * push * dt;
      }
    }

    let d = e.mesh.position.distanceTo(vex.position);

    if (!game.wantedShown) {
      // path toward Vex
      const toVex = new THREE.Vector3().subVectors(vex.position, e.mesh.position);
      toVex.y = 0;
      d = toVex.length();
      if (d > 0.01) {
        toVex.normalize();
        e.mesh.position.x += toVex.x * e.speed * dt;
        e.mesh.position.z += toVex.z * e.speed * dt;
        e.mesh.rotation.y = Math.atan2(toVex.x, toVex.z);
      }
      // zombies collide with solid props too
      resolveCollision(e.mesh.position, 0.4);

      // attack — only when on foot
      const attackRange = e.type === 'brute' ? 1.6 : 1.2;
      const dmgPerSec = e.type === 'brute' ? 35 : 25;
      if (!player.inVehicle && d < attackRange) {
        game.hp -= dmgPerSec * dt;
        game.shakeIntensity = Math.max(game.shakeIntensity, 0.15);
        updateHUD();
        if (game.hp <= 0) { gameOver(); return; }
      }
    }

    // bob animation always (so frozen zombies still look alive-ish)
    e.bobPhase += dt * (e.type === 'bomber' ? 6 : 4);
    e.mesh.position.y = Math.abs(Math.sin(e.bobPhase)) * (e.type === 'brute' ? 0.08 : 0.15);
    e.mesh.rotation.z = Math.sin(e.bobPhase) * 0.08;
    // hit flash
    if (e.hitFlash > 0) {
      e.hitFlash -= dt;
      e.mesh.scale.setScalar(e.scale * (1 + e.hitFlash * 0.4));
    } else {
      e.mesh.scale.setScalar(e.scale);
    }
  }

  // ---- pickups update ----
  const focusPos = player.inVehicle ? truckState.position : vex.position;
  const pickRad = player.inVehicle ? 2.8 : 1.4;
  for (let i = game.pickups.length - 1; i >= 0; i--) {
    const p = game.pickups[i];
    p.bobPhase += dt * 3;
    p.mesh.position.y = 0.05 + Math.abs(Math.sin(p.bobPhase)) * 0.18;
    p.mesh.rotation.y += dt * 1.6;
    p.lifetime -= dt;
    const dx = p.mesh.position.x - focusPos.x;
    const dz = p.mesh.position.z - focusPos.z;
    if (Math.hypot(dx, dz) < pickRad) {
      weapon.pistolAmmo = Math.min(PISTOL_AMMO_MAX, weapon.pistolAmmo + PISTOL_AMMO_PER_PICKUP);
      scene.remove(p.mesh);
      game.pickups.splice(i, 1);
      updateWeaponBar();
      continue;
    }
    // blink near end of life
    if (p.lifetime < 4) p.mesh.visible = Math.sin(p.lifetime * 8) > 0;
    if (p.lifetime <= 0) {
      scene.remove(p.mesh);
      game.pickups.splice(i, 1);
    }
  }

  // ---- effects update ----
  for (let i = effects.length - 1; i >= 0; i--) {
    const fx = effects[i];
    fx.life -= dt;
    if (fx.vel) {
      fx.mesh.position.x += fx.vel.x * dt;
      fx.mesh.position.y += fx.vel.y * dt;
      fx.mesh.position.z += fx.vel.z * dt;
      if (fx.gravity) fx.vel.y -= 12 * dt;
      if (fx.mesh.position.y < 0.05) {
        fx.mesh.position.y = 0.05;
        fx.vel.y *= -0.3;
        fx.vel.x *= 0.7; fx.vel.z *= 0.7;
      }
    }
    if (fx.expand && fx.mesh.scale) {
      const k = 1 + (1 - fx.life/fx.maxLife) * 1.4;
      fx.mesh.scale.setScalar(k);
    }
    if (fx.light) {
      fx.light.intensity = (fx.life / fx.maxLife) * 6;
    }
    if (fx.mat && fx.mat.opacity !== undefined && fx.mat.transparent) {
      fx.mat.opacity = Math.max(0, fx.life / fx.maxLife);
    }
    if (fx.life <= 0) {
      scene.remove(fx.mesh);
      if (fx.mesh.geometry) fx.mesh.geometry.dispose();
      if (fx.mat && fx.mat.dispose) fx.mat.dispose();
      effects.splice(i, 1);
    }
  }

  // ---- flicker flames ----
  for (const fb of flameBarrelsRef) {
    const f = fb.userData.flicker;
    f.t += dt * 8;
    const flicker = 0.85 + Math.sin(f.t) * 0.12 + Math.random() * 0.1;
    f.flame.scale.set(flicker, flicker, flicker);
    f.flameInner.scale.set(flicker * 0.9, flicker * 1.1, flicker * 0.9);
    f.light.intensity = 1.2 + Math.sin(f.t) * 0.3;
  }

  // ---- pulse outpost beacon (the navigation landmark) ----
  const beaconPhase = performance.now() * 0.003;
  const beaconK = Math.abs(Math.sin(beaconPhase));
  outpost.beaconLight.intensity = 1.4 + beaconK * 2.6;
  outpost.beacon.scale.setScalar(0.85 + beaconK * 0.3);

  // ---- camera follow ----
  const followPos = player.inVehicle ? truckState.position : vex.position;
  const camY = player.inVehicle ? (isTouch ? 22 : 19) : (isTouch ? 19 : 16);
  const camZ = player.inVehicle ? (isTouch ? 17 : 15) : (isTouch ? 15 : 13);
  const targetCamPos = new THREE.Vector3(followPos.x, camY, followPos.z + camZ);
  const camOffset = new THREE.Vector3().subVectors(game.mouseWorld, followPos);
  camOffset.y = 0;
  camOffset.clampLength(0, 4).multiplyScalar(player.inVehicle ? 0 : 0.25);
  targetCamPos.x += camOffset.x;
  targetCamPos.z += camOffset.z;

  camera.position.lerp(targetCamPos, 0.08);
  if (game.shakeIntensity > 0) {
    camera.position.x += (Math.random()-0.5) * game.shakeIntensity;
    camera.position.y += (Math.random()-0.5) * game.shakeIntensity;
    game.shakeIntensity *= 0.85;
    if (game.shakeIntensity < 0.005) game.shakeIntensity = 0;
  }

  // sun + shadow camera follow whichever the camera is on
  sun.position.set(followPos.x + 15, 22, followPos.z + 8);
  sun.target.position.copy(followPos);
  sun.target.updateMatrixWorld();
  const lookTarget = new THREE.Vector3(
    followPos.x + camOffset.x * 0.7,
    1, followPos.z + camOffset.z * 0.7
  );
  camera.lookAt(lookTarget);

  // weapon UI updates that depend on cooldown
  if (weapon.current === 'sword') {
    const swordBtn = document.querySelector('.weapon-btn[data-weapon="sword"]');
    swordBtn.querySelector('.heat-overlay').style.height = (Math.max(0, weapon.shootCD / 0.55) * 100) + '%';
  }

  if (dialogueTimer > 0) {
    dialogueTimer -= dt;
    if (dialogueTimer <= 0) document.getElementById('dialogue').style.display = 'none';
  }
}

function loop() {
  const dt = Math.min(clock.getDelta(), 0.05);
  update(dt);
  renderer.render(scene, camera);
  requestAnimationFrame(loop);
}

// initial camera
camera.position.set(0, isTouch ? 19 : 16, isTouch ? 15 : 13);
camera.lookAt(0, 1, 0);

addEventListener('resize', () => {
  camera.aspect = innerWidth / innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(innerWidth, innerHeight);
});

// swap controls hint on touch
if (isTouch) {
  document.getElementById('controls-card').innerHTML = `
    <div style="margin-bottom:6px;"><strong>D-PAD</strong> move (hold two for diagonals)</div>
    <div style="margin-bottom:6px;"><strong>FIRE</strong> auto-aims nearest rad-zombie</div>
    <div style="margin-bottom:6px;"><strong>WEAPON ICONS</strong> swap pistols / minigun / blade</div>
    <em style="font-size:13px;">Red ring marks your target &nbsp;·&nbsp; tap ❚❚ to pause</em>
  `;
}

loop();
</script>
