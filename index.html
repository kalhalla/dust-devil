<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<title>DUST DEVIL: Vex vs. the Glowing Dead</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
html, body {
  position: fixed; inset: 0;
  width: 100%; height: 100%;
  overflow: hidden; overscroll-behavior: none;
  touch-action: none;
}
body { background: #000; font-family: 'Impact', 'Arial Black', sans-serif; cursor: crosshair; user-select: none; -webkit-user-select: none; -webkit-tap-highlight-color: transparent; -webkit-touch-callout: none; }
canvas { display: block; }

#ui { position: fixed; inset: 0; pointer-events: none; z-index: 10; }

.hud {
  position: absolute; background: #f4d03f; color: #000;
  padding: 10px 18px; border: 4px solid #000;
  font-weight: 900; letter-spacing: 1px;
  box-shadow: 4px 4px 0 #000;
}
#health { top: 18px; left: 18px; font-size: 18px; transform: rotate(-2deg); background: #d62828; color: #fff; }
#score  { top: 18px; right: 18px; font-size: 18px; transform: rotate(2deg); background: #f4d03f; }
#wave   { bottom: 18px; left: 18px; font-size: 16px; background: #000; color: #66ff44; transform: rotate(-1deg); border-color: #66ff44; }
#weapon-info { bottom: 18px; right: 18px; font-size: 14px; transform: rotate(1deg); background: #000; color: #f4d03f; border-color: #f4d03f; min-width: 140px; text-align: center; }
#weapon-info .heatbar { display: block; height: 6px; background: #2a2a2a; margin-top: 5px; border: 1px solid #f4d03f; }
#weapon-info .heatbar-fill { display: block; height: 100%; background: linear-gradient(90deg, #f4d03f, #d62828); width: 0%; transition: width 0.05s linear; }

#weapon-bar {
  position: fixed; top: 80px; left: 50%;
  transform: translateX(-50%); z-index: 11;
  display: none; gap: 10px;
  pointer-events: auto;
}
#weapon-bar.show { display: flex; }
.weapon-btn {
  width: 70px; height: 70px;
  background: #000; color: #f4d03f;
  border: 4px solid #f4d03f;
  cursor: pointer; padding: 0;
  font-family: inherit; font-weight: 900;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  position: relative;
  box-shadow: 4px 4px 0 #000;
  transform: rotate(-2deg);
  transition: transform 0.08s;
}
.weapon-btn:nth-child(2) { transform: rotate(1deg); }
.weapon-btn:nth-child(3) { transform: rotate(-1deg); }
.weapon-btn.active { background: #f4d03f; color: #000; border-color: #000; box-shadow: 4px 4px 0 #d62828; }
.weapon-btn .key { position: absolute; top: 2px; left: 4px; font-size: 11px; opacity: 0.7; }
.weapon-btn .glyph { font-size: 22px; line-height: 1; margin-top: 6px; }
.weapon-btn .name { font-size: 9px; letter-spacing: 0.5px; margin-top: 3px; }
.weapon-btn .heat-overlay {
  position: absolute; bottom: 0; left: 0; right: 0;
  height: 0%; background: rgba(214, 40, 40, 0.7);
  pointer-events: none; transition: height 0.1s linear;
}
.weapon-btn.overheat { animation: shake 0.15s infinite; border-color: #d62828 !important; }
@keyframes shake {
  0%, 100% { transform: rotate(-2deg) translate(0, 0); }
  25% { transform: rotate(-2deg) translate(-2px, 1px); }
  75% { transform: rotate(-2deg) translate(2px, -1px); }
}

#crosshair {
  position: fixed; width: 36px; height: 36px;
  border: 3px solid #d62828; border-radius: 50%;
  pointer-events: none; z-index: 5;
  transform: translate(-50%, -50%);
  mix-blend-mode: difference;
  display: none;
}
#crosshair::before, #crosshair::after {
  content: ''; position: absolute; background: #d62828; height: 3px;
}
#crosshair::before { left: -10px; top: 50%; width: 8px; transform: translateY(-50%); }
#crosshair::after  { right: -10px; top: 50%; width: 8px; transform: translateY(-50%); }

#dialogue {
  position: fixed; top: 170px; left: 50%; z-index: 8;
  background: #fff; border: 4px solid #000; padding: 12px 22px;
  font-size: 22px; font-weight: 900;
  box-shadow: 6px 6px 0 #000;
  font-family: 'Comic Sans MS', cursive;
  display: none; transform: translateX(-50%) rotate(-2deg);
  white-space: nowrap;
}
#dialogue::after {
  content: ''; position: absolute; bottom: -16px; left: 30%;
  width: 0; height: 0;
  border-left: 12px solid transparent; border-right: 12px solid transparent;
  border-top: 16px solid #000;
}

.screen {
  position: fixed; inset: 0; z-index: 100;
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  pointer-events: auto;
}
#title-screen { background: linear-gradient(180deg, #c44530 0%, #d4753a 60%, #d4a574 100%); }
#gameover { background: rgba(0,0,0,0.85); display: none; }

.title-main {
  font-size: clamp(44px, 9vw, 110px); color: #f4d03f;
  -webkit-text-stroke: 4px #000;
  text-shadow: 8px 8px 0 #d62828, 16px 16px 0 #000;
  transform: rotate(-3deg); letter-spacing: 2px;
  margin-bottom: 6px;
}
.title-sub {
  font-size: clamp(18px, 2.6vw, 32px);
  color: #000; background: #f4d03f;
  padding: 8px 26px; border: 4px solid #000;
  transform: rotate(2deg); margin-bottom: 36px;
  box-shadow: 5px 5px 0 #000;
}
.btn {
  font-family: inherit; font-weight: 900; letter-spacing: 2px;
  font-size: 26px; padding: 18px 46px;
  background: #d62828; color: #fff;
  border: 4px solid #000; cursor: pointer;
  box-shadow: 6px 6px 0 #000;
  transform: rotate(-1deg);
  transition: transform 0.08s;
}
.btn:hover { transform: rotate(-1deg) scale(1.04); }
.btn:active { transform: rotate(-1deg) translate(3px, 3px); box-shadow: 3px 3px 0 #000; }

.controls-card {
  margin-top: 28px; color: #000; font-size: 15px;
  background: #fff; padding: 14px 22px; border: 3px solid #000;
  transform: rotate(1deg); text-align: center; line-height: 1.7;
  box-shadow: 4px 4px 0 #000; max-width: 460px;
}
.controls-card strong { background: #000; color: #f4d03f; padding: 1px 8px; }

#gameover h1 {
  color: #d62828; font-size: clamp(50px, 10vw, 110px);
  -webkit-text-stroke: 3px #fff; transform: rotate(-3deg);
  text-shadow: 6px 6px 0 #000;
}
#gameover p { color: #fff; font-size: 22px; margin: 18px 0 28px; font-family: 'Comic Sans MS', cursive; text-align: center; }
#final-score { color: #f4d03f; font-size: 30px; font-weight: 900; }

#kills-flash {
  position: fixed; left: 50%; top: 30%;
  transform: translate(-50%, -50%) rotate(-4deg);
  font-size: 60px; color: #66ff44;
  -webkit-text-stroke: 3px #000;
  text-shadow: 4px 4px 0 #000;
  pointer-events: none; opacity: 0; z-index: 9;
}

.dust-grain {
  position: fixed; pointer-events: none; z-index: 1;
  width: 100%; height: 100%;
  background-image: 
    radial-gradient(circle at 20% 30%, rgba(0,0,0,0.04) 1px, transparent 1px),
    radial-gradient(circle at 60% 70%, rgba(0,0,0,0.04) 1px, transparent 1px);
  background-size: 4px 4px, 6px 6px;
  mix-blend-mode: multiply;
}

/* === WANTED POSTER === */
#wanted-poster {
  position: fixed; top: 50%; left: 50%;
  transform: translate(-50%, -50%) rotate(-3deg);
  width: 320px; max-width: 88vw;
  background:
    repeating-linear-gradient(115deg, rgba(0,0,0,0.04) 0 2px, transparent 2px 7px),
    linear-gradient(135deg, #d4b896 0%, #c4a474 100%);
  border: 4px solid #1a0e08;
  padding: 18px 22px 22px;
  font-family: 'Georgia', 'Times New Roman', serif;
  color: #1a0e08;
  z-index: 80;
  pointer-events: none;
  box-shadow: 8px 8px 0 #000;
  display: none;
}
#wanted-poster.show {
  display: block;
  animation: wantedSlam 4s ease-out forwards;
}
@keyframes wantedSlam {
  0%   { transform: translate(-50%, -150%) rotate(-25deg) scale(0.4); opacity: 0; }
  6%   { transform: translate(-50%, -50%) rotate(8deg) scale(1.18); opacity: 1; }
  10%  { transform: translate(-50%, -50%) rotate(-3deg) scale(0.95); }
  14%  { transform: translate(-50%, -50%) rotate(-3deg) scale(1); }
  88%  { transform: translate(-50%, -50%) rotate(-3deg) scale(1); opacity: 1; }
  100% { transform: translate(-50%, 60%) rotate(-30deg) scale(0.5); opacity: 0; }
}
.wanted-header {
  font-family: 'Impact', 'Arial Black', sans-serif;
  font-size: 46px; font-weight: 900;
  letter-spacing: 8px; text-align: center;
  border-bottom: 3px solid #1a0e08;
  padding-bottom: 2px; margin-bottom: 4px;
  line-height: 1;
}
.wanted-status {
  text-align: center;
  font-size: 13px; letter-spacing: 5px;
  margin-bottom: 12px; font-weight: bold;
}
.wanted-portrait {
  width: 100%; height: 165px;
  border: 3px solid #1a0e08;
  margin-bottom: 12px;
  display: flex; align-items: center; justify-content: center;
  position: relative; overflow: hidden;
}
.wanted-portrait svg { width: auto; height: 95%; }
.wanted-name {
  font-family: 'Impact', 'Arial Black', sans-serif;
  font-size: 26px; font-weight: 900; text-align: center;
  letter-spacing: 2px; margin-bottom: 8px;
}
.wanted-crime {
  font-style: italic; font-size: 13px;
  text-align: center; line-height: 1.4;
  margin-bottom: 14px;
}
.wanted-reward {
  text-align: center; border: 4px double #1a0e08;
  padding: 8px;
  font-family: 'Impact', 'Arial Black', sans-serif;
  font-size: 32px; font-weight: 900;
  background: rgba(255,255,255,0.25);
  letter-spacing: 2px;
}
.wanted-stamp {
  position: absolute; bottom: 14px; right: 18px;
  background: #d62828; color: #fff;
  padding: 5px 10px; font-size: 9px;
  font-weight: 900; letter-spacing: 1px;
  transform: rotate(-12deg);
  font-family: 'Impact', sans-serif;
  text-align: center; line-height: 1.2;
  border: 2px solid #1a0e08;
  pointer-events: none;
}

/* === BOUNTY CLAIMED FLASH === */
#bounty-claim {
  position: fixed; left: 50%; top: 28%;
  transform: translateX(-50%);
  background: #f4d03f;
  border: 5px solid #000;
  padding: 14px 28px;
  font-family: 'Impact', 'Arial Black', sans-serif;
  z-index: 70;
  box-shadow: 8px 8px 0 #d62828;
  display: none;
  text-align: center;
  pointer-events: none;
  min-width: 280px;
}
#bounty-claim.show {
  display: block;
  animation: bountySlam 2.4s ease-out forwards;
}
@keyframes bountySlam {
  0%   { transform: translateX(-50%) rotate(-15deg) scale(0); opacity: 0; }
  8%   { transform: translateX(-50%) rotate(3deg) scale(1.2); opacity: 1; }
  16%  { transform: translateX(-50%) rotate(-3deg) scale(1); }
  85%  { transform: translateX(-50%) rotate(-3deg) scale(1); opacity: 1; }
  100% { transform: translateX(-50%) rotate(-3deg) scale(1) translateY(-26px); opacity: 0; }
}
.bc-tag { font-size: 14px; letter-spacing: 4px; color: #000; }
.bc-name { font-size: 26px; color: #000; margin: 4px 0; letter-spacing: 1px; }
.bc-value { font-size: 32px; color: #d62828; -webkit-text-stroke: 2px #000; }

/* bounty book in game over */
#bounty-summary {
  margin-top: 18px; max-width: 90vw;
  font-family: 'Impact', sans-serif;
}
#bounty-summary .bs-header {
  font-size: 16px; letter-spacing: 3px;
  color: #f4d03f; margin-bottom: 6px; text-align: center;
}
#bounty-summary .bs-row {
  font-size: 15px; color: #fff;
  letter-spacing: 1px; margin: 2px 0; text-align: center;
}
#bounty-summary .bs-row .bs-name { color: #fff; }
#bounty-summary .bs-row .bs-val { color: #f4d03f; margin-left: 8px; }
#bounty-summary .bs-total {
  font-size: 18px; color: #66ff44;
  margin-top: 6px; text-align: center;
  letter-spacing: 2px;
}
#bounty-summary .bs-empty { font-size: 14px; color: #888; font-style: italic; text-align: center; }

@media (max-width: 700px) {
  #wanted-poster { width: 280px; padding: 14px 18px 18px; }
  .wanted-header { font-size: 38px; letter-spacing: 6px; }
  .wanted-portrait { height: 140px; }
  .wanted-name { font-size: 22px; }
  .wanted-reward { font-size: 26px; }
  #bounty-claim { padding: 10px 20px; min-width: 240px; }
  .bc-name { font-size: 22px; }
  .bc-value { font-size: 26px; }
}

/* === MOBILE / TOUCH UI === */
#joy-left {
  position: fixed; pointer-events: none; z-index: 20;
  width: 130px; height: 130px;
  border: 5px solid #000; border-radius: 50%;
  background: rgba(244, 208, 63, 0.4);
  transform: translate(-50%, -50%);
  display: none;
  box-shadow: 4px 4px 0 rgba(0,0,0,0.5);
}
#joy-left.active { display: block; }
.joystick-stick {
  position: absolute; left: 50%; top: 50%;
  width: 56px; height: 56px;
  background: #f4d03f; border: 4px solid #000;
  border-radius: 50%;
  transform: translate(-50%, -50%);
  box-shadow: 2px 2px 0 #000;
}

#shoot-btn {
  position: fixed;
  bottom: 35px; right: 35px;
  width: 130px; height: 130px;
  background: #d62828; color: #fff;
  border: 5px solid #000; border-radius: 50%;
  font-size: 28px; font-weight: 900;
  font-family: inherit; letter-spacing: 2px;
  cursor: pointer;
  z-index: 20;
  display: none;
  align-items: center; justify-content: center;
  user-select: none; -webkit-user-select: none;
  box-shadow: 6px 6px 0 #000;
  transform: rotate(-3deg);
  padding: 0; touch-action: none;
  -webkit-tap-highlight-color: transparent;
}
#shoot-btn.show { display: flex; }
#shoot-btn.pressed { background: #ff5544; box-shadow: 3px 3px 0 #000; transform: rotate(-3deg) translate(3px, 3px); }

#pause-btn {
  position: fixed; top: 18px; left: 50%;
  width: 52px; height: 52px;
  background: #000; color: #f4d03f;
  border: 4px solid #f4d03f; border-radius: 50%;
  cursor: pointer; z-index: 11;
  box-shadow: 4px 4px 0 #000;
  display: none;
  font-family: inherit; padding: 0;
  align-items: center; justify-content: center;
  transform: translateX(-50%) rotate(-2deg);
}
#pause-btn.show { display: flex; }
#pause-btn .bar { display: inline-block; width: 5px; height: 18px; background: currentColor; margin: 0 2px; }

#pause-overlay {
  position: fixed; inset: 0; z-index: 90;
  background: rgba(0,0,0,0.85);
  display: none; flex-direction: column;
  align-items: center; justify-content: center;
}
#pause-overlay.show { display: flex; pointer-events: auto; }
#pause-overlay h2 {
  font-size: clamp(40px, 9vw, 80px);
  color: #f4d03f; -webkit-text-stroke: 3px #000;
  text-shadow: 6px 6px 0 #d62828;
  transform: rotate(-3deg); margin-bottom: 30px;
}
#pause-overlay .btn { margin: 8px 0; font-size: 22px; padding: 16px 40px; min-width: 240px; }
#pause-overlay .btn.secondary { background: #000; color: #f4d03f; border-color: #f4d03f; box-shadow: 6px 6px 0 #d62828; }

@media (hover: none) and (pointer: coarse) {
  #crosshair { display: none !important; }
  body { cursor: default; }
}

@media (max-width: 700px) {
  .hud { font-size: 13px; padding: 7px 12px; border-width: 3px; box-shadow: 3px 3px 0 #000; letter-spacing: 0.5px; }
  #health, #score { top: 14px; }
  #wave, #weapon-info { bottom: 14px; }
  #health { left: 14px; } #score { right: 14px; }
  #wave { left: 14px; } #weapon-info { right: 14px; min-width: 100px; font-size: 11px; }
  .title-main { font-size: clamp(38px, 13vw, 80px); text-shadow: 5px 5px 0 #d62828, 10px 10px 0 #000; }
  .title-sub { font-size: clamp(14px, 4vw, 22px); padding: 6px 18px; box-shadow: 4px 4px 0 #000; margin-bottom: 26px; }
  .btn { font-size: 22px; padding: 22px 38px; box-shadow: 5px 5px 0 #000; }
  .controls-card { font-size: 14px; padding: 12px 18px; line-height: 1.8; }
  #pause-btn { width: 46px; height: 46px; top: 12px; }
  #pause-btn .bar { width: 4px; height: 16px; }
  #weapon-bar { top: 70px; gap: 6px; }
  .weapon-btn { width: 56px; height: 56px; }
  .weapon-btn .glyph { font-size: 18px; }
  .weapon-btn .name { font-size: 8px; }
  #dialogue { font-size: 16px; padding: 8px 16px; max-width: 90vw; white-space: normal; text-align: center; top: 145px; }
  #kills-flash { font-size: 44px; }
  #gameover h1 { font-size: clamp(48px, 14vw, 100px); }
  #gameover p { font-size: 18px; }
}

@media (max-height: 480px) {
  #wave { bottom: auto; top: 14px; left: 50%; transform: translateX(-50%) rotate(-1deg); }
  #pause-btn { top: 14px; left: auto; right: 14px; transform: rotate(-2deg); }
  #weapon-bar { top: 14px; left: auto; right: 80px; transform: none; }
  #weapon-bar .weapon-btn { width: 48px; height: 48px; }
  #weapon-info { bottom: 14px; }
  #shoot-btn { width: 108px; height: 108px; bottom: 20px; right: 20px; font-size: 22px; }
  .controls-card { font-size: 12px; padding: 8px 14px; line-height: 1.5; }
  .title-main { font-size: clamp(28px, 8vh, 60px); }
  .title-sub { font-size: clamp(12px, 3vh, 18px); margin-bottom: 14px; }
  #title-screen .btn { font-size: 18px; padding: 14px 28px; }
}

@media (max-width: 380px) {
  #shoot-btn { width: 110px; height: 110px; bottom: 28px; right: 28px; font-size: 24px; }
}

/* === INTERACT (E / tap) PROMPT === */
#interact-btn {
  position: fixed;
  bottom: 38%;
  left: 50%;
  transform: translateX(-50%) rotate(-2deg);
  background: #f4d03f;
  color: #000;
  border: 4px solid #000;
  padding: 10px 22px;
  font-family: 'Impact', 'Arial Black', sans-serif;
  font-weight: 900;
  font-size: 18px;
  letter-spacing: 2px;
  box-shadow: 5px 5px 0 #000;
  z-index: 30;
  cursor: pointer;
  display: none;
  align-items: center;
  gap: 12px;
  user-select: none;
  -webkit-user-select: none;
  -webkit-tap-highlight-color: transparent;
  touch-action: none;
}
#interact-btn.show { display: flex; }
#interact-btn:active,
#interact-btn.pressed {
  box-shadow: 2px 2px 0 #000;
  transform: translateX(-50%) rotate(-2deg) translate(3px, 3px);
}
#interact-btn .key {
  background: #000;
  color: #f4d03f;
  padding: 2px 9px;
  border: 2px solid #f4d03f;
  font-size: 14px;
  letter-spacing: 1px;
}

#speedometer {
  position: fixed;
  bottom: 18px;
  left: 50%;
  transform: translateX(-50%) rotate(-1deg);
  background: #000;
  color: #f4d03f;
  border: 4px solid #f4d03f;
  padding: 6px 18px;
  font-family: 'Impact', sans-serif;
  font-weight: 900;
  font-size: 18px;
  letter-spacing: 2px;
  box-shadow: 4px 4px 0 #000;
  z-index: 11;
  display: none;
  pointer-events: none;
}
#speedometer.show { display: block; }
#speedometer .unit { font-size: 11px; opacity: 0.7; margin-left: 4px; }
</style>
</head>
<body>

<div class="dust-grain"></div>

<div id="ui">
  <div id="health" class="hud">❤ HP 100</div>
  <div id="score"  class="hud">$0</div>
  <div id="wave"   class="hud">WAVE 1</div>
  <div id="weapon-info" class="hud">DUAL PISTOLS<br>∞</div>
</div>

<div id="weapon-bar">
  <button class="weapon-btn active" data-weapon="pistols" type="button">
    <span class="key">1</span><span class="glyph">▓▓</span><span class="name">PISTOLS</span>
    <span class="heat-overlay"></span>
  </button>
  <button class="weapon-btn" data-weapon="minigun" type="button">
    <span class="key">2</span><span class="glyph">⫶⫶⫶</span><span class="name">MINIGUN</span>
    <span class="heat-overlay"></span>
  </button>
  <button class="weapon-btn" data-weapon="sword" type="button">
    <span class="key">3</span><span class="glyph">/</span><span class="name">SWORD</span>
    <span class="heat-overlay"></span>
  </button>
</div>

<div id="crosshair"></div>
<div id="dialogue"></div>
<div id="kills-flash"></div>

<div id="wanted-poster"></div>
<div id="bounty-claim"></div>

<div id="title-screen" class="screen">
  <div class="title-main">DUST DEVIL</div>
  <div class="title-sub">VEX vs. THE GLOWING DEAD</div>
  <button class="btn" id="start-btn">RIDE OUT</button>
  <div class="controls-card" id="controls-card">
    <strong>WASD</strong> move &nbsp; <strong>MOUSE</strong> aim<br>
    <strong>CLICK / HOLD</strong> fire &nbsp; <strong>SHIFT</strong> sprint<br>
    <strong>1 / 2 / 3</strong> swap weapons<br>
    <em style="font-size:13px;">Don't let the rad-meat get a hand on you.</em>
  </div>
</div>

<div id="gameover" class="screen">
  <h1>VEX DOWN</h1>
  <p>The wasteland eats another bounty hunter.<br><span id="final-score">$0</span></p>
  <div id="bounty-summary"></div>
  <button class="btn" id="restart-btn" style="margin-top:18px;">ANOTHER ROUND</button>
</div>

<button id="pause-btn" type="button" aria-label="Pause"><span class="bar"></span><span class="bar"></span></button>

<div id="pause-overlay">
  <h2>PAUSED</h2>
  <button class="btn" id="resume-btn">RESUME</button>
  <button class="btn secondary" id="quit-btn">QUIT TO TITLE</button>
</div>

const sfxBuffers = {};

function decodeB64ToArrayBuffer(b64) {
  const bin = atob(b64);
  const len = bin.length;
  const ab = new ArrayBuffer(len);
  const view = new Uint8Array(ab);
  for (let i = 0; i < len; i++) view[i] = bin.charCodeAt(i);
  return ab;
}

    try {
      const ab = decodeB64ToArrayBuffer(b64);
      sfxBuffers[name] = await audioCtx.decodeAudioData(ab);
    } catch (e) {
      console.warn('failed to decode sample', name, e);
    }
  }
}

function playSample(name, volume = 1.0, pitchVar = 0) {
  if (!audioCtx) return;
  const buf = sfxBuffers[name];
  if (!buf) return;
  const src = audioCtx.createBufferSource();
  src.buffer = buf;
  if (pitchVar > 0) {
    src.playbackRate.value = 1 + (Math.random() - 0.5) * pitchVar;
  }
  const g = audioCtx.createGain();
  g.gain.value = volume;
  src.connect(g);
  g.connect(masterGain);
  src.start();
}

function startTruckEngine() {
  if (!audioCtx || truckEngine) return;
  const e = {};
  e.osc = audioCtx.createOscillator();
  e.osc.type = 'sawtooth';
  e.osc.frequency.value = 55;
  e.filter = audioCtx.createBiquadFilter();
  e.filter.type = 'lowpass';
  e.filter.frequency.value = 200;
  e.gain = audioCtx.createGain();
  e.gain.gain.value = 0;
  e.osc.connect(e.filter);
  e.filter.connect(e.gain);
  e.gain.connect(masterGain);
  e.osc.start();
  e.gain.gain.linearRampToValueAtTime(0.12, audioCtx.currentTime + 0.25);
  truckEngine = e;
}
function updateTruckEngine(speedAbs) {
  if (!truckEngine) return;
  const norm = Math.min(1, speedAbs / 14);
  const t = audioCtx.currentTime;
  truckEngine.osc.frequency.setTargetAtTime(50 + norm * 100, t, 0.08);
  truckEngine.filter.frequency.setTargetAtTime(160 + norm * 800, t, 0.08);
  truckEngine.gain.gain.setTargetAtTime(0.09 + norm * 0.13, t, 0.1);
}
function stopTruckEngine() {
  if (!truckEngine) return;
  const e = truckEngine;
  const t = audioCtx.currentTime;
  e.gain.gain.cancelScheduledValues(t);
  e.gain.gain.setValueAtTime(e.gain.gain.value, t);
  e.gain.gain.linearRampToValueAtTime(0, t + 0.3);
  e.osc.stop(t + 0.35);
  truckEngine = null;
}

const PROP_BOUNDS = 50;
const PLAY_RADIUS = 60;
const OUTPOST_POS = new THREE.Vector3(36, 0, -22);
const ROAD_WIDTH = 6;            // metres, both crossroad strips
const ROAD_CLEAR = 3.5;           // no-prop margin from road centreline
const propPlacements = [];
const solidObstacles = [];        // { x, z, r } circles; Vex/truck/zombies collide with these

function resolveCollision(pos, agentRadius) {
  for (const o of solidObstacles) {
    const dx = pos.x - o.x;
    const dz = pos.z - o.z;
    const d = Math.hypot(dx, dz);
    const minD = o.r + agentRadius;
    if (d < minD) {
      if (d > 0.0001) {
        const overlap = minD - d;
        pos.x += (dx / d) * overlap;
        pos.z += (dz / d) * overlap;
      } else {
        pos.x += minD; // exactly on top: shove +x
      }
    }
  }
}

function placeProp(prop, minDist = 2, solidRadius = 0) {
  for (let tries=0; tries<25; tries++) {
    const x = (Math.random()-0.5) * PROP_BOUNDS * 2;
    const z = (Math.random()-0.5) * PROP_BOUNDS * 2;
    if (Math.sqrt(x*x+z*z) < 4) continue;
    // keep out around the outpost
    const dox = x - OUTPOST_POS.x, doz = z - OUTPOST_POS.z;
    if (Math.hypot(dox, doz) < 9) continue;
    // keep off the crossroads (E-W along z = OUTPOST_POS.z; N-S along x = OUTPOST_POS.x)
    if (Math.abs(z - OUTPOST_POS.z) < ROAD_CLEAR) continue;
    if (Math.abs(x - OUTPOST_POS.x) < ROAD_CLEAR) continue;
    let ok = true;
    for (const p of propPlacements) {
      if (Math.hypot(p.x-x, p.z-z) < minDist) { ok = false; break; }
    }
    if (ok) {
      prop.position.set(x, 0, z);
      prop.rotation.y = Math.random() * Math.PI * 2;
      propPlacements.push({x, z});
      props.add(prop);
      if (solidRadius > 0) solidObstacles.push({ x, z, r: solidRadius });
      return true;
    }
  }
  return false;
}

  const sL = outlined(new THREE.BoxGeometry(0.4, 3, 6), toonMat(stone), 1.02);
  sL.position.set(-3, 1.5, 0);
  g.add(sL);
  const sR = outlined(new THREE.BoxGeometry(0.4, 3, 6), toonMat(stone), 1.02);
  sR.position.set(3, 1.5, 0);
  g.add(sR);
  // tin roof
  const roof = outlined(new THREE.BoxGeometry(6.6, 0.3, 6.6), toonMat(tin), 1.02);
  roof.position.set(0, 3.2, 0);
  g.add(roof);
  // exposed wood roof beams
  for (let z of [3.1, -3.1]) {
    const beam = outlined(new THREE.BoxGeometry(7, 0.15, 0.15), toonMat(wood), 1.05);
    beam.position.set(0, 3.0, z);
    g.add(beam);
  }
  // wooden door in doorway
  const door = outlined(new THREE.BoxGeometry(1.6, 2.4, 0.1), toonMat(wood), 1.04);
  door.position.set(0, 1.2, 2.95);
  g.add(door);
  for (let i = -1; i <= 1; i++) {
    const plank = new THREE.Mesh(new THREE.BoxGeometry(0.04, 2.2, 0.06), toonMat(woodDk));
    plank.position.set(i * 0.42, 1.2, 3.005);

  }
  // door knob
  const knob = new THREE.Mesh(new THREE.SphereGeometry(0.05, 8, 6), toonMat(0xc8a040));
  knob.position.set(0.6, 1.2, 3.05);
  g.add(knob);

  // ===== sandbags around the front (cover) =====
  const sandbagSpots = [
    [-3.6, 0.2,  3.2], [-2.7, 0.2,  3.5], [-1.8, 0.2,  3.7],
    [ 3.6, 0.2,  3.2], [ 2.7, 0.2,  3.5], [ 1.8, 0.2,  3.7],
    [-3.6, 0.6,  3.2], [-2.7, 0.6,  3.5],
    [ 3.6, 0.6,  3.2], [ 2.7, 0.6,  3.5],
    [-3.7, 0.2,  0.5], [-3.7, 0.2, -1.0],
    [ 3.7, 0.2,  0.5], [ 3.7, 0.2, -1.0]
  ];
  for (const [x, y, z] of sandbagSpots) {

      new THREE.BoxGeometry(long ? 0.4 : 0.85, 0.36, long ? 0.85 : 0.42),

    );

    bag.rotation.y = (Math.random() - 0.5) * 0.25;
    g.add(bag);
  }

  // ===== radio tower with pulsing red beacon =====
  const towerH = 9.5;
  const towerG = new THREE.Group();
  towerG.position.set(2.5, 0, -3.6);
  // 4 vertical struts
  for (let i = 0; i < 4; i++) {
    const a = (i / 4) * Math.PI * 2 + Math.PI / 4;
    const strut = outlined(new THREE.BoxGeometry(0.08, towerH, 0.08), toonMat(0x4a4a4a), 1.05);
    strut.position.set(Math.cos(a) * 0.32, towerH/2, Math.sin(a) * 0.32);
    towerG.add(strut);
  }
  // crossbeams
  for (let h = 1.2; h < towerH - 0.5; h += 1.4) {
    for (let s = 0; s < 4; s++) {
      const a1 = (s / 4) * Math.PI * 2 + Math.PI / 4;
      const a2 = ((s+1) / 4) * Math.PI * 2 + Math.PI / 4;
      const x1 = Math.cos(a1) * 0.32, z1 = Math.sin(a1) * 0.32;
      const x2 = Math.cos(a2) * 0.32, z2 = Math.sin(a2) * 0.32;
      const dx = x2 - x1, dz = z2 - z1;
      const len = Math.hypot(dx, dz);
      const cross = new THREE.Mesh(new THREE.BoxGeometry(0.04, 0.04, len), toonMat(0x4a4a4a));
      cross.position.set((x1+x2)/2, h, (z1+z2)/2);
      cross.rotation.y = -Math.atan2(dz, dx);
      towerG.add(cross);
    }
  }
  // antenna spike
  const antenna = outlined(new THREE.CylinderGeometry(0.02, 0.02, 1.4, 4), toonMat(0x2a2a2a), 1.05);
  antenna.position.y = towerH + 0.7;
  towerG.add(antenna);
  // beacon (the pulsing landmark)
  const beacon = new THREE.Mesh(new THREE.SphereGeometry(0.22, 12, 8), new THREE.MeshBasicMaterial({ color: red }));
  beacon.position.y = towerH;
  towerG.add(beacon);
  const beaconLight = new THREE.PointLight(red, 2.5, 16);
  beaconLight.position.y = towerH;
  towerG.add(beaconLight);
  g.add(towerG);

  // ===== flag pole + yellow marshal flag with star =====
  const pole = outlined(new THREE.CylinderGeometry(0.06, 0.06, 5.5, 6), toonMat(wood), 1.05);
  pole.position.set(-2.7, 2.75, -3.5);
  g.add(pole);
  // pole top finial
  const finial = outlined(new THREE.SphereGeometry(0.1, 8, 6), toonMat(0xc8a040), 1.05);
  finial.position.set(-2.7, 5.55, -3.5);
  g.add(finial);
  // flag plane (yellow)
  const flag = new THREE.Mesh(
    new THREE.PlaneGeometry(1.5, 0.9),
    new THREE.MeshBasicMaterial({ color: yellow, side: THREE.DoubleSide })
  );
  flag.position.set(-1.95, 4.7, -3.5);
  g.add(flag);
  // black star on flag (5 cone points + center disc)
  const starMat = new THREE.MeshBasicMaterial({ color: black });
  for (let i = 0; i < 5; i++) {
    const a = (i/5) * Math.PI * 2 - Math.PI/2;
    const point = new THREE.Mesh(new THREE.ConeGeometry(0.08, 0.2, 3), starMat);
    point.position.set(-1.95 + Math.cos(a) * 0.18, 4.7 + Math.sin(a) * 0.18, -3.485);
    point.rotation.z = a + Math.PI/2;
    point.scale.set(1, 0.55, 0.05);
    g.add(point);
  }
  const starCenter = new THREE.Mesh(new THREE.CircleGeometry(0.13, 5), starMat);
  starCenter.position.set(-1.95, 4.7, -3.484);
  g.add(starCenter);

  // ===== "MARSHAL" sign over the door =====
  const signBack = outlined(new THREE.BoxGeometry(2.6, 0.5, 0.1), toonMat(wood), 1.04);
  signBack.position.set(0, 3.4, 3.1);
  g.add(signBack);
  const signCanvas = document.createElement('canvas');
  signCanvas.width = 256; signCanvas.height = 64;
  const sctx = signCanvas.getContext('2d');
  sctx.fillStyle = '#3a2614';
  sctx.fillRect(0, 0, 256, 64);
  sctx.strokeStyle = '#f4d03f';
  sctx.lineWidth = 4;
  sctx.strokeRect(4, 4, 248, 56);
  sctx.fillStyle = '#f4d03f';
  sctx.font = 'bold 38px Impact, "Arial Black", sans-serif';
  sctx.textAlign = 'center'; sctx.textBaseline = 'middle';
  sctx.fillText('MARSHAL', 128, 36);
  const signTex = new THREE.CanvasTexture(signCanvas);
  signTex.minFilter = THREE.LinearFilter;
  const signFront = new THREE.Mesh(
    new THREE.PlaneGeometry(2.6, 0.5),
    new THREE.MeshBasicMaterial({ map: signTex, transparent: true })
  );
  signFront.position.set(0, 3.4, 3.16);
  g.add(signFront);

  // ===== lanterns at door corners =====
  for (const [x, z] of [[-2.6, 3.05], [2.6, 3.05]]) {
    const lantern = new THREE.Mesh(
      new THREE.BoxGeometry(0.18, 0.24, 0.18),
      new THREE.MeshBasicMaterial({ color: 0xfff099 })
    );
    lantern.position.set(x, 2.8, z);
    g.add(lantern);
    const ll = new THREE.PointLight(0xfff099, 0.9, 5);
    ll.position.set(x, 2.8, z);
    g.add(ll);
  }

  // ===== a few skull totems flanking the entrance =====
  for (let s = -1; s <= 1; s += 2) {
    const post = outlined(new THREE.CylinderGeometry(0.08, 0.1, 1.6, 6), toonMat(woodDk), 1.06);
    post.position.set(s * 4.5, 0.8, 4);
    g.add(post);
    const skull = outlined(new THREE.SphereGeometry(0.18, 10, 8), toonMat(0xeae0c8), 1.06);
    skull.position.set(s * 4.5, 1.7, 4);
    skull.rotation.y = -s * 0.4;
    g.add(skull);
  }

  return { group: g, beacon, beaconLight };
}

// ==================== TRUCK ====================
function makeTruck() {
  const g = new THREE.Group();
  const paint = 0x8a3a25;
  const paintDk = 0x5a2818;
  const wood = 0x4a2818;
  const metal = 0x2a2a2a;
  const rust = 0x6a3520;
  const brass = 0xc8a040;
  const steel = 0x6a6a6a;
  const tire = 0x141414;
  const yellow = 0xfff099;

  // chassis under the body
  const chassis = outlined(new THREE.BoxGeometry(2.0, 0.25, 4.4), toonMat(metal), 1.03);
  chassis.position.y = 0.4;
  g.add(chassis);

  // cabin
  const cabin = outlined(new THREE.BoxGeometry(2.1, 1.0, 1.6), toonMat(paint), 1.03);
  cabin.position.set(0, 1.05, -0.3);
  g.add(cabin);
  // cabin roof darker
  const roof = outlined(new THREE.BoxGeometry(2.0, 0.15, 1.5), toonMat(paintDk), 1.04);
  roof.position.set(0, 1.6, -0.3);
  g.add(roof);
  // windshield
  const ws = new THREE.Mesh(new THREE.PlaneGeometry(1.85, 0.7), toonMat(0x141820));
  ws.position.set(0, 1.15, 0.42);
  ws.rotation.x = -0.3;
  g.add(ws);
  // side windows
  for (let s = -1; s <= 1; s += 2) {
    const sw = new THREE.Mesh(new THREE.PlaneGeometry(1.4, 0.55), toonMat(0x141820));
    sw.position.set(s * 1.06, 1.15, -0.3);
    sw.rotation.y = s * Math.PI/2;
    g.add(sw);
  }
  // back window
  const bw = new THREE.Mesh(new THREE.PlaneGeometry(1.6, 0.55), toonMat(0x141820));
  bw.position.set(0, 1.15, -1.06);
  bw.rotation.y = Math.PI;
  g.add(bw);

  // hood (front)
  const hood = outlined(new THREE.BoxGeometry(2.0, 0.22, 1.2), toonMat(paint), 1.04);
  hood.position.set(0, 0.78, 1.5);
  g.add(hood);

  // grill
  const grill = outlined(new THREE.BoxGeometry(1.6, 0.55, 0.2), toonMat(metal), 1.04);
  grill.position.set(0, 0.6, 2.05);
  g.add(grill);
  for (let i = -2; i <= 2; i++) {
    const bar = new THREE.Mesh(new THREE.BoxGeometry(0.05, 0.5, 0.22), toonMat(steel));
    bar.position.set(i * 0.27, 0.6, 2.07);
    g.add(bar);
  }

  // bumper spikes
  for (let i = -1; i <= 1; i += 2) {
    const spike = outlined(new THREE.ConeGeometry(0.1, 0.45, 4), toonMat(steel), 1.06);
    spike.position.set(i * 0.7, 0.5, 2.3);
    spike.rotation.x = Math.PI/2;
    g.add(spike);
  }
  // central bumper bar
  const bumper = outlined(new THREE.BoxGeometry(2.0, 0.18, 0.2), toonMat(rust), 1.04);
  bumper.position.set(0, 0.32, 2.18);
  g.add(bumper);

  // headlights
  for (let i = -1; i <= 1; i += 2) {
    const lamp = new THREE.Mesh(new THREE.SphereGeometry(0.15, 8, 6), new THREE.MeshBasicMaterial({ color: yellow }));
    lamp.position.set(i * 0.7, 0.78, 2.0);
    g.add(lamp);
    const housing = outlined(new THREE.CylinderGeometry(0.18, 0.18, 0.15, 10), toonMat(metal), 1.05);
    housing.rotation.x = Math.PI/2;
    housing.position.set(i * 0.7, 0.78, 1.93);
    g.add(housing);
  }

  // skull on hood
  const hskull = outlined(new THREE.SphereGeometry(0.2, 10, 8), toonMat(0xeae0c8), 1.06);
  hskull.userData.mesh.scale.set(1, 0.85, 0.55);
  hskull.position.set(0, 0.95, 1.4);
  g.add(hskull);
  for (let s = -1; s <= 1; s += 2) {
    const eye = new THREE.Mesh(new THREE.SphereGeometry(0.025, 6, 5), toonMat(0x000000));
    eye.position.set(s * 0.05, 0.99, 1.52);
    g.add(eye);
  }

  // back bed (open)
  const bedFloor = outlined(new THREE.BoxGeometry(2.0, 0.15, 1.9), toonMat(rust), 1.04);
  bedFloor.position.set(0, 0.6, -1.55);
  g.add(bedFloor);
  // bed walls (left, right, tailgate)
  const bedWalls = [
    { p: [-1.0, 0.85, -1.55], s: [0.1, 0.5, 1.9] },
    { p: [ 1.0, 0.85, -1.55], s: [0.1, 0.5, 1.9] },
    { p: [ 0.0, 0.85, -2.5],  s: [2.0, 0.5, 0.1] }
  ];
  for (const w of bedWalls) {
    const wall = outlined(new THREE.BoxGeometry(...w.s), toonMat(rust), 1.04);
    wall.position.set(...w.p);
    g.add(wall);
  }
  // welded scrap detail on tailgate
  const scrap = new THREE.Mesh(new THREE.BoxGeometry(0.6, 0.2, 0.06), toonMat(metal));
  scrap.position.set(0, 0.95, -2.55);
  scrap.rotation.z = 0.15;
  g.add(scrap);

  // wheels (with steerable front pair)
  const wheels = {};
  const wheelGeom = new THREE.CylinderGeometry(0.45, 0.45, 0.4, 12);
  const wheelMat = toonMat(tire);
  const wheelSpec = [
    ['fl', -0.95,  1.5, true],
    ['fr',  0.95,  1.5, true],
    ['rl', -0.95, -1.5, false],
    ['rr',  0.95, -1.5, false]
  ];
  for (const [key, x, z, steerable] of wheelSpec) {
    // wheel pivot group (so we can steer the front pair)
    const pivot = new THREE.Group();
    pivot.position.set(x, 0.45, z);
    g.add(pivot);
    const wheel = new THREE.Mesh(wheelGeom, wheelMat);
    wheel.rotation.z = Math.PI/2;
    wheel.castShadow = true;
    pivot.add(wheel);
    // wheel outline
    const outline = new THREE.Mesh(wheelGeom, outlineMat);
    outline.rotation.z = Math.PI/2;
    outline.scale.setScalar(1.05);
    pivot.add(outline);
    // hub cap
    const hub = new THREE.Mesh(new THREE.CylinderGeometry(0.18, 0.18, 0.42, 8), toonMat(0x6a4530));
    hub.rotation.z = Math.PI/2;
    pivot.add(hub);
    wheels[key] = { pivot, wheel, steerable };
  }

  // roll cage (visible above bed)
  const cageMat = toonMat(0x4a4a4a);
  // 4 vertical posts
  const cagePosts = [[-1.0, -0.5], [1.0, -0.5], [-1.0, -2.4], [1.0, -2.4]];
  for (const [x, z] of cagePosts) {
    const post = outlined(new THREE.CylinderGeometry(0.05, 0.05, 1.5, 6), cageMat, 1.06);
    post.position.set(x, 1.6, z);
    g.add(post);
  }
  // top crossbeams
  for (const [x1, z1, x2, z2] of [
    [-1.0, -0.5, 1.0, -0.5],
    [-1.0, -2.4, 1.0, -2.4],
    [-1.0, -0.5, -1.0, -2.4],
    [ 1.0, -0.5,  1.0, -2.4]
  ]) {
    const dx = x2 - x1, dz = z2 - z1;
    const len = Math.hypot(dx, dz);
    const beam = new THREE.Mesh(new THREE.BoxGeometry(0.06, 0.06, len), cageMat);
    beam.position.set((x1+x2)/2, 2.35, (z1+z2)/2);
    beam.rotation.y = -Math.atan2(dz, dx);
    g.add(beam);
  }

  // exhaust pipes
  for (let s = -1; s <= 1; s += 2) {
    const pipe = outlined(new THREE.CylinderGeometry(0.1, 0.12, 1.2, 8), toonMat(metal), 1.05);
    pipe.position.set(s * 0.85, 1.7, -1.0);
    g.add(pipe);
    const pipeTop = outlined(new THREE.CylinderGeometry(0.13, 0.1, 0.15, 8), toonMat(0x141414), 1.06);
    pipeTop.position.set(s * 0.85, 2.4, -1.0);
    g.add(pipeTop);
  }

  // dust grime patches
  for (let i = 0; i < 8; i++) {
    const dust = new THREE.Mesh(
      new THREE.SphereGeometry(0.06 + Math.random() * 0.08, 5, 4),
      toonMat(0xa6885c)
    );
    dust.position.set((Math.random() - 0.5) * 1.8, 0.3 + Math.random() * 1.2, (Math.random() - 0.5) * 4);
    g.add(dust);
  }

  // headlight cones (visual, only emit when driving — toggled later)
  const headlightL = new THREE.SpotLight(0xfff099, 0, 25, Math.PI / 5, 0.4, 1.5);
  headlightL.position.set(-0.6, 0.78, 2.0);
  headlightL.target.position.set(-0.6, 0, 8);
  g.add(headlightL); g.add(headlightL.target);
  const headlightR = new THREE.SpotLight(0xfff099, 0, 25, Math.PI / 5, 0.4, 1.5);
  headlightR.position.set(0.6, 0.78, 2.0);
  headlightR.target.position.set(0.6, 0, 8);
  g.add(headlightR); g.add(headlightR.target);

  return { group: g, wheels, headlights: [headlightL, headlightR] };
}

  padG.add(padSkull);
  for (let s = -1; s <= 1; s += 2) {

    e.position.set(s * 0.018, 0.085, 0.245);
    padG.add(e);
  }
  // 4 silver spikes on top of pad
  for (let i = 0; i < 4; i++) {
    const a = (i / 4) * Math.PI - Math.PI / 2;
    const spike = outlined(new THREE.ConeGeometry(0.04, 0.16, 4), toonMat(0xb8b8b8), 1.06);
    spike.position.set(Math.cos(a) * 0.16, 0.06, Math.sin(a) * 0.1);

  }
  bodyG.add(padG);
  // tiny left strap (asymmetric)
  const lStrap = outlined(new THREE.BoxGeometry(0.1, 0.18, 0.18), toonMat(leather), 1.05);

  bodyG.add(lStrap);

  // hip holster (right, always visible)

  // ==================== HEAD ====================

  // pink hair spikes (8)

  for (const [x, y, z, rx, rz] of spikes) {

    spk.position.set(x, y, z);
    spk.rotation.x = rx;
    spk.rotation.z = rz;
    headG.add(spk);
  }

  // octagonal goggles on forehead
  for (let s = -1; s <= 1; s += 2) {
    const frame = outlined(new THREE.CylinderGeometry(0.1, 0.1, 0.05, 8), toonMat(armor), 1.06);

    lens.rotation.x = Math.PI / 2;
    lens.position.set(s * 0.13, 0.18, 0.252);

  }
  const gBridge = new THREE.Mesh(new THREE.BoxGeometry(0.07, 0.025, 0.04), toonMat(armor));

  // strap behind goggles
  const gStrap = outlined(new THREE.TorusGeometry(0.27, 0.025, 4, 14, Math.PI), toonMat(leather), 1.05);
  gStrap.rotation.y = Math.PI;
  gStrap.rotation.z = Math.PI;
  gStrap.position.set(0, 0.18, 0);
  headG.add(gStrap);

  // pink eyebrows
  for (let s = -1; s <= 1; s += 2) {
    const brow = new THREE.Mesh(new THREE.BoxGeometry(0.13, 0.04, 0.025), toonMat(hairDk));

  // black anime-style eyes

  // pink "tear" cheek marks
  for (let s = -1; s <= 1; s += 2) {

  // ears + earrings

  // black studded choker
  const choker = outlined(new THREE.TorusGeometry(0.18, 0.025, 5, 16), toonMat(black), 1.06);
  choker.rotation.x = Math.PI / 2;
  choker.scale.set(1.05, 0.6, 1.05);
  choker.position.y = -0.32;
  headG.add(choker);
  for (let i = 0; i < 8; i++) {
    const a = (i / 8) * Math.PI * 2;
    const stud = new THREE.Mesh(new THREE.ConeGeometry(0.014, 0.028, 4), toonMat(0xb0b0b0));
    stud.position.set(Math.cos(a) * 0.2, -0.32, Math.sin(a) * 0.12);
    stud.rotation.x = -Math.PI / 2 + Math.sin(a) * 0.5;
    stud.rotation.z = Math.cos(a) * 0.5;

  }

  // ==================== ARMS ====================
  function makeArm(side) {
    const armG = new THREE.Group();
    // upper arm — bare skin
    const upper = outlined(new THREE.CapsuleGeometry(0.1, 0.28, 4, 10), toonMat(skin), 1.07);
    upper.position.y = -0.16;
    armG.add(upper);
    // brown upper-arm wrap
    const upperWrap = outlined(new THREE.TorusGeometry(0.105, 0.025, 4, 12), toonMat(leather), 1.06);
    upperWrap.position.y = -0.05;
    armG.add(upperWrap);
    // pink wristband (upper)
    const upperBand = outlined(new THREE.TorusGeometry(0.105, 0.022, 4, 12), toonMat(hair), 1.06);
    upperBand.position.y = 0.03;
    armG.add(upperBand);
    // forearm
    const forearm = outlined(new THREE.CapsuleGeometry(0.09, 0.22, 4, 10), toonMat(skin), 1.07);
    forearm.position.y = -0.42;
    armG.add(forearm);
    // brown wrist wrap
    const wrap = outlined(new THREE.CylinderGeometry(0.1, 0.1, 0.14, 10), toonMat(leather), 1.05);

    // hand (fingerless brown glove)

    glove.position.y = -0.7;
    armG.add(glove);

    const weaponSlot = new THREE.Group();
    weaponSlot.position.set(0, -0.78, 0.1);
    armG.add(weaponSlot);
    armG.userData.weaponSlot = weaponSlot;

    armG.position.set(side * 0.45, 0.32, 0.05);
    armG.userData.basePos = armG.position.clone();
    armG.userData.baseRot = new THREE.Euler(-0.3, 0, side * -0.1);
    armG.rotation.copy(armG.userData.baseRot);
    return armG;
  }
  const armL = makeArm(-1);
  const armR = makeArm(1);
  bodyG.add(armL);
  bodyG.add(armR);

  // ==================== LEGS ====================
  function makeLeg(side, hasMedicalCross) {
    const g = new THREE.Group();
    // olive shorts thigh
    const thigh = outlined(new THREE.BoxGeometry(0.28, 0.32, 0.3), toonMat(olive), 1.05);
    thigh.position.y = -0.08;
    g.add(thigh);
    // off-white inner cuff at hem of shorts
    const innerCuff = outlined(new THREE.BoxGeometry(0.3, 0.06, 0.31), toonMat(cuff), 1.04);
    innerCuff.position.y = -0.22;
    g.add(innerCuff);
    // brown thigh strap (right leg)
    if (side === 1) {
      const strap = outlined(new THREE.TorusGeometry(0.16, 0.022, 4, 14), toonMat(leather), 1.06);
      strap.rotation.x = Math.PI / 2;
      strap.scale.set(1, 1, 0.95);
      strap.position.y = -0.12;
      g.add(strap);
    }
    // armored knee pad
    const knee = outlined(new THREE.BoxGeometry(0.26, 0.16, 0.28), toonMat(armor), 1.05);
    knee.position.y = -0.32;
    g.add(knee);
    // medical cross plate on right knee
    if (hasMedicalCross) {
      const circle = outlined(new THREE.CylinderGeometry(0.1, 0.1, 0.03, 14), toonMat(0xa01818), 1.06);
      circle.rotation.x = Math.PI / 2;
      circle.position.set(0, -0.32, 0.16);
      g.add(circle);
      const cH = new THREE.Mesh(new THREE.BoxGeometry(0.13, 0.035, 0.015), toonMat(white));
      cH.position.set(0, -0.32, 0.18);
      g.add(cH);
      const cV = new THREE.Mesh(new THREE.BoxGeometry(0.035, 0.13, 0.015), toonMat(white));
      cV.position.set(0, -0.32, 0.18);
      g.add(cV);
    }
    // black tights/leggings on shin
    const shin = outlined(new THREE.BoxGeometry(0.22, 0.34, 0.24), toonMat(tights), 1.05);
    shin.position.y = -0.55;
    g.add(shin);
    // pink ankle band
    const ankleBand = outlined(new THREE.TorusGeometry(0.13, 0.024, 4, 14), toonMat(hair), 1.06);
    ankleBand.rotation.x = Math.PI / 2;
    ankleBand.scale.set(1, 1, 1);
    ankleBand.position.y = -0.74;
    g.add(ankleBand);
    // chunky boot — brown sole, grey toe
    const bootSole = outlined(new THREE.BoxGeometry(0.32, 0.18, 0.42), toonMat(0x4a3520), 1.05);
    bootSole.position.set(0, -0.86, 0.05);
    g.add(bootSole);
    const bootToe = outlined(new THREE.BoxGeometry(0.3, 0.16, 0.18), toonMat(0x9a9a9a), 1.05);
    bootToe.position.set(0, -0.85, 0.22);
    g.add(bootToe);
    const bootStrap = outlined(new THREE.TorusGeometry(0.18, 0.022, 4, 14), toonMat(leather), 1.06);
    bootStrap.rotation.x = Math.PI / 2;
    bootStrap.scale.set(1, 1, 0.7);
    bootStrap.position.set(0, -0.78, 0.05);
    g.add(bootStrap);

    g.position.set(side * 0.16, -0.5, 0);
    return g;
  }
  const legL = makeLeg(-1, false);
  const legR = makeLeg(1, true);
  bodyG.add(legL);
  bodyG.add(legR);

  // ==================== STOWED-WEAPON SLOTS ====================
  // hip-slung minigun slot (left hip)
  const hipSlot = new THREE.Group();
  hipSlot.position.set(-0.38, -0.28, -0.02);
  hipSlot.rotation.set(0.3, -0.2, 0.6);
  bodyG.add(hipSlot);

  // back-sword slot (over right shoulder)
  const backSlot = new THREE.Group();
  backSlot.position.set(-0.18, 0.55, -0.32);
  backSlot.rotation.set(0.2, 0, 0.4);
  bodyG.add(backSlot);

  // pink shoulder strap for slung minigun (visual cue)
  const slingMat = new THREE.MeshBasicMaterial({ color: hair });
  const sling = new THREE.Mesh(new THREE.TorusGeometry(0.42, 0.025, 4, 14), slingMat);
  sling.rotation.z = 0.55;
  sling.rotation.x = -0.3;
  sling.position.y = 0.05;
  sling.scale.set(1, 1, 0.4);
  bodyG.add(sling);

  root.userData = { bodyG, headG, armL, armR, legL, legR, hipSlot, backSlot };
  return root;
}

function makeMinigun() {
  const grp = new THREE.Group();
  const body = outlined(new THREE.BoxGeometry(0.36, 0.36, 0.5), toonMat(0x1f1f1f), 1.05);
  grp.add(body);
  // skull emblem on side
  const sk = outlined(new THREE.SphereGeometry(0.08, 10, 8), toonMat(0xeae0c8), 1.06);
  sk.userData.mesh.scale.set(1, 0.85, 0.4);
  sk.position.set(0.19, 0.04, 0);
  grp.add(sk);
  for (let s = -1; s <= 1; s += 2) {
    const e = new THREE.Mesh(new THREE.SphereGeometry(0.014, 6, 5), toonMat(0x000000));
    e.position.set(0.215, 0.06, s * 0.025);
    grp.add(e);
  }
  // jaw line
  const skJaw = new THREE.Mesh(new THREE.BoxGeometry(0.02, 0.014, 0.03), toonMat(0x000000));
  skJaw.position.set(0.218, 0.02, 0);
  grp.add(skJaw);
  // grip
  const grip = outlined(new THREE.BoxGeometry(0.18, 0.32, 0.18), toonMat(0x2a1810), 1.06);
  grip.position.set(0, -0.3, -0.1);
  grp.add(grip);
  // foregrip
  const fgrip = outlined(new THREE.BoxGeometry(0.14, 0.22, 0.14), toonMat(0x2a1810), 1.06);
  fgrip.position.set(0, -0.24, 0.18);
  grp.add(fgrip);
  // barrel cluster
  const barrels = new THREE.Group();
  for (let i = 0; i < 6; i++) {
    const a = (i / 6) * Math.PI * 2;
    const r = 0.11;
    const barrel = outlined(new THREE.CylinderGeometry(0.045, 0.045, 0.6, 6), toonMat(0x141414), 1.06);
    barrel.rotation.x = Math.PI/2;
    barrel.position.set(Math.cos(a) * r, Math.sin(a) * r, 0.55);
    barrels.add(barrel);
  }
  const hub = outlined(new THREE.CylinderGeometry(0.18, 0.18, 0.12, 12), toonMat(0x444444), 1.05);
  hub.rotation.x = Math.PI/2;
  hub.position.set(0, 0, 0.3);
  barrels.add(hub);
  grp.add(barrels);
  // ammo box top
  const ammoBox = outlined(new THREE.BoxGeometry(0.28, 0.22, 0.32), toonMat(0x4a4020), 1.05);
  ammoBox.position.set(0, 0.29, -0.05);
  grp.add(ammoBox);
  // belt feed
  const beltMat = toonMat(0xc8a040);
  for (let i = 0; i < 4; i++) {
    const link = new THREE.Mesh(new THREE.BoxGeometry(0.06, 0.05, 0.05), beltMat);
    link.position.set(0.16, 0.12 - i * 0.05, -0.05);
    grp.add(link);
  }
  // pink strap loop on top
  const strapLoop = new THREE.Mesh(new THREE.TorusGeometry(0.045, 0.012, 4, 10), toonMat(0xe33677));
  strapLoop.rotation.z = Math.PI/2;
  strapLoop.position.set(0, 0.43, 0);
  grp.add(strapLoop);
  // muzzle flash
  const flashMat = new THREE.MeshBasicMaterial({ color: 0xfff099, transparent: true, opacity: 0 });
  const flash = new THREE.Mesh(new THREE.SphereGeometry(0.32, 8, 6), flashMat);
  flash.scale.set(1, 1, 1.8);
  flash.position.set(0, 0, 0.85);
  grp.add(flash);
  // heat glow
  const heatGlow = new THREE.Mesh(
    new THREE.CylinderGeometry(0.2, 0.2, 0.6, 12),
    new THREE.MeshBasicMaterial({ color: 0xff3322, transparent: true, opacity: 0 })
  );
  heatGlow.rotation.x = Math.PI/2;
  heatGlow.position.set(0, 0, 0.55);
  grp.add(heatGlow);

  grp.userData.flash = flash;
  grp.userData.barrels = barrels;
  grp.userData.heatGlow = heatGlow;
  grp.userData.barrelTip = new THREE.Vector3(0, 0, 0.85);
  return grp;
}

function makeNameLabel(name) {
  const canvas = document.createElement('canvas');
  canvas.width = 512; canvas.height = 96;
  const ctx = canvas.getContext('2d');
  ctx.fillStyle = '#000';
  ctx.fillRect(0, 0, 512, 96);
  ctx.strokeStyle = '#f4d03f';
  ctx.lineWidth = 6;
  ctx.strokeRect(4, 4, 504, 88);
  ctx.fillStyle = '#f4d03f';
  ctx.font = 'bold 48px Impact, "Arial Black", sans-serif';
  ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
  ctx.fillText(name, 256, 50);
  const tex = new THREE.CanvasTexture(canvas);
  tex.minFilter = THREE.LinearFilter;
  const mat = new THREE.SpriteMaterial({ map: tex, transparent: true, depthTest: false });
  const sprite = new THREE.Sprite(mat);
  sprite.scale.set(3.2, 0.6, 1);
  return sprite;
}

function applyTint(mesh, tint, strength = 0.55) {
  mesh.traverse(c => {
    if (c.isMesh && c.material && c.material.gradientMap) {
      const orig = c.material.color.clone();
      const mat = c.material.clone();
      mat.color = orig.lerp(new THREE.Color(tint), strength);
      c.material = mat;
    }
  });
}

  halo.rotation.x = -Math.PI / 2;
  halo.position.y = 0.05;

  const dir = new THREE.Vector3().subVectors(to, from);

  const geom = new THREE.CylinderGeometry(0.025, 0.025, len, 6);
  const mat = new THREE.MeshBasicMaterial({ color, transparent: true, opacity: 0.9 });
  const m = new THREE.Mesh(geom, mat);
  m.position.copy(from).add(dir.clone().multiplyScalar(0.5));

  m.rotateX(Math.PI/2);
  scene.add(m);
  effects.push({ mesh: m, mat, life: 0.08, maxLife: 0.08, type: 'tracer' });
}

    s.position.set(pos.x + Math.sin(a)*r, pos.y + Math.random() * 0.5 - 0.2, pos.z + Math.cos(a)*r);
    scene.add(s);
    effects.push({
      mesh: s, mat: sparkMat,
      vel: new THREE.Vector3((Math.random()-0.5)*3, Math.random()*2+1, (Math.random()-0.5)*3),
      life: 0.35, maxLife: 0.35, gravity: true
    });
  }
}

function spawnSmoke(pos) {
  for (let i = 0; i < 3; i++) {
    const geom = new THREE.SphereGeometry(0.18+Math.random()*0.1, 5, 4);
    const mat = new THREE.MeshBasicMaterial({ color: 0x444444, transparent: true, opacity: 0.5 });
    const m = new THREE.Mesh(geom, mat);
    m.position.copy(pos);
    const v = new THREE.Vector3((Math.random()-0.5)*1, Math.random()*1.5+0.5, (Math.random()-0.5)*1);
    scene.add(m);
    effects.push({ mesh: m, mat, vel: v, life: 0.8, maxLife: 0.8, type: 'smoke' });
  }
}

}

// === FLOATING LEFT JOYSTICK ===
const touchState = {
  left: { active: false, id: null, startX: 0, startY: 0, dx: 0, dy: 0 }
};
const joyLeftEl = document.getElementById('joy-left');
const joyLeftStick = joyLeftEl.querySelector('.joystick-stick');

function showJoy(x, y, dx, dy) {
  joyLeftEl.style.left = x + 'px';
  joyLeftEl.style.top = y + 'px';
  joyLeftEl.classList.add('active');
  joyLeftStick.style.transform = `translate(calc(-50% + ${dx}px), calc(-50% + ${dy}px))`;
}
function hideJoy() { joyLeftEl.classList.remove('active'); }

function isUITouch(target) {
  return target && target.closest && target.closest('#pause-btn, #pause-overlay, #title-screen, #gameover, #weapon-bar, #shoot-btn, #interact-btn');
}

addEventListener('touchstart', (e) => {
  if (isUITouch(e.target)) return;
  if (game.state !== 'playing' || game.paused) return;
  e.preventDefault();
  for (const t of e.changedTouches) {
    // joystick only claims touches in the left half (right half is for FIRE button area)
    if (t.clientX >= window.innerWidth / 2) continue;
    if (touchState.left.active) continue;
    touchState.left.active = true;
    touchState.left.id = t.identifier;
    touchState.left.startX = t.clientX;
    touchState.left.startY = t.clientY;
    touchState.left.dx = 0; touchState.left.dy = 0;
    showJoy(t.clientX, t.clientY, 0, 0);
  }
}, { passive: false });

addEventListener('touchmove', (e) => {
  if (game.state !== 'playing' || game.paused) return;
  let consumed = false;
  for (const t of e.changedTouches) {
    const ts = touchState.left;
    if (!ts.active || ts.id !== t.identifier) continue;
    let dx = t.clientX - ts.startX;
    let dy = t.clientY - ts.startY;
    const len = Math.hypot(dx, dy);
    if (len > JOY_MAX_R) { dx = dx / len * JOY_MAX_R; dy = dy / len * JOY_MAX_R; }
    ts.dx = dx; ts.dy = dy;
    showJoy(ts.startX, ts.startY, dx, dy);
    consumed = true;
  }
  if (consumed) e.preventDefault();
}, { passive: false });

function endTouch(e) {
  for (const t of e.changedTouches) {
    if (touchState.left.id === t.identifier) {
      touchState.left.active = false;
      touchState.left.id = null;
      touchState.left.dx = 0; touchState.left.dy = 0;
      hideJoy();
    }
  }
}
addEventListener('touchend', endTouch);
addEventListener('touchcancel', endTouch);

function releaseAllButtons() {
  for (const k in btnState) btnState[k] = false;
  document.getElementById('shoot-btn').classList.remove('pressed');
  // release joystick too
  touchState.left.active = false;
  touchState.left.id = null;
  touchState.left.dx = 0; touchState.left.dy = 0;
  hideJoy();
}

function enterTruck() {

  weaponBar.classList.remove('show');

  startTruckEngine();
  updateInteractPrompt();
}

function exitTruck() {
  if (!player.inVehicle) return;
  player.inVehicle = false;
  truckState.occupied = false;
  // place Vex on the driver's side (left side of truck)
  const sideOffset = new THREE.Vector3(-1.7, 0, 0);
  sideOffset.applyAxisAngle(new THREE.Vector3(0, 1, 0), truckState.heading);
  vex.position.copy(truckState.position).add(sideOffset);
  vex.position.y = 0;
  vex.visible = true;
  // soft brake
  truckState.speed *= 0.3;
  // headlights off
  truckState.headlights.forEach(h => h.intensity = 0);
  // restore weapon bar
  weaponBar.classList.add('show');
  speedometer.classList.remove('show');
  stopTruckEngine();
  updateInteractPrompt();
}

function tryInteract() {
  if (game.state !== 'playing' || game.paused) return;
  if (player.inVehicle) exitTruck();
  else enterTruck();

function updateInteractPrompt() {
  if (game.state !== 'playing' || game.paused) {

  const labelEl = interactBtn.querySelector('.label');

}

// ==================== TRUCK PHYSICS ====================
function updateTruck(dt) {
  let accel = 0, turn = 0;
  // joystick takes priority on touch
  if (touchState.left.active) {
    const jx = touchState.left.dx / JOY_MAX_R;
    const jy = touchState.left.dy / JOY_MAX_R;
    if (Math.hypot(jx, jy) > 0.15) {
      // up on screen (negative y) = forward
      accel = -jy;
      turn = jx;
    }
  } else {
    if (keys['KeyW'] || keys['ArrowUp']) accel += 1;
    if (keys['KeyS'] || keys['ArrowDown']) accel -= 1;
    if (keys['KeyA'] || keys['ArrowLeft']) turn -= 1;
    if (keys['KeyD'] || keys['ArrowRight']) turn += 1;
  }

  // accel / brake / coast
  if (accel > 0) {
    truckState.speed += truckState.accel * dt;
  } else if (accel < 0) {
    if (truckState.speed > 0.5) {
      truckState.speed -= truckState.brakeDecel * dt;
    } else {
      truckState.speed -= truckState.accel * dt;
    }
  } else {
    if (truckState.speed > 0) truckState.speed = Math.max(0, truckState.speed - truckState.decel * dt);
    else if (truckState.speed < 0) truckState.speed = Math.min(0, truckState.speed + truckState.decel * dt);
  }
  truckState.speed = Math.max(truckState.reverseMaxSpeed, Math.min(truckState.maxSpeed, truckState.speed));

  // turning — rate scales with how fast you're going (sluggish at low speed)
  truckState.steer += (turn - truckState.steer) * Math.min(1, dt * 10);
  if (Math.abs(truckState.speed) > 0.5) {
    const speedFactor = Math.min(1, Math.abs(truckState.speed) / 6);
    truckState.heading += truckState.steer * truckState.turnRate * dt * speedFactor * Math.sign(truckState.speed);
  }

  // move along heading
  truckState.position.x += Math.sin(truckState.heading) * truckState.speed * dt;
  truckState.position.z += Math.cos(truckState.heading) * truckState.speed * dt;

  // clamp inside play area
  const distFromCenter = Math.hypot(truckState.position.x, truckState.position.z);
  if (distFromCenter > PLAY_RADIUS - 2) {
    const k = (PLAY_RADIUS - 2) / distFromCenter;
    truckState.position.x *= k;
    truckState.position.z *= k;
    truckState.speed *= 0.3;
  }
  // collide with solid props — kill momentum on impact
  const beforeX = truckState.position.x;
  const beforeZ = truckState.position.z;
  resolveCollision(truckState.position, 1.5);
  if (Math.hypot(truckState.position.x - beforeX, truckState.position.z - beforeZ) > 0.05) {
    truckState.speed *= 0.25;
  }

  // apply
  truckState.mesh.position.copy(truckState.position);
  truckState.mesh.rotation.y = truckState.heading;
  // keep vex.position synced so enemies path to the truck while occupied
  vex.position.copy(truckState.position);

  // wheel animation
  const spin = truckState.speed * dt * 2.2;
  for (const k of ['fl', 'fr', 'rl', 'rr']) {
    const w = truckState.wheels[k];
    if (!w) continue;
    w.wheel.rotation.x += spin;
    if (w.steerable) w.pivot.rotation.y = truckState.steer * 0.5;
  }

  // speedometer (rough mph; speed is ~m/s, *2.2 for vibes)
  speedVal.textContent = Math.round(Math.abs(truckState.speed) * 2.2);
  updateTruckEngine(Math.abs(truckState.speed));
}

// ==================== SHOOTING / WEAPON FIRING ====================
function getMuzzleWorld(weaponMesh) {
  const tip = weaponMesh.userData.barrelTip || new THREE.Vector3(0, 0, 0.5);
  const v = tip.clone();
  weaponMesh.localToWorld(v);
  return v;
}

function aimDirFromVex(muzzlePos, spread = 0.04) {
  const aimDir = new THREE.Vector3().subVectors(game.mouseWorld, muzzlePos);
  aimDir.y = 0;
  aimDir.normalize();
  aimDir.x += (Math.random()-0.5) * spread;
  aimDir.z += (Math.random()-0.5) * spread;
  return aimDir.normalize();
}

function hitscan(from, dir, maxDist, damage, color) {
  let hitEnemy = null;
  let hitDist = maxDist;
  let hitPoint = null;
  for (const e of game.enemies) {
    const ePos = e.mesh.position.clone();
    ePos.y = from.y;
    const toE = new THREE.Vector3().subVectors(ePos, from);
    const dist = toE.length();
    if (dist > maxDist) continue;
    const proj = toE.dot(dir);
    if (proj < 0) continue;
    const closest = from.clone().add(dir.clone().multiplyScalar(proj));
    const perp = closest.distanceTo(ePos);
    const radius = e.type === 'brute' ? 0.9 : 0.7;
    if (perp < radius && proj < hitDist) {
      hitDist = proj;
      hitEnemy = e;
      hitPoint = closest;
    }
  }
  const endPoint = from.clone().add(dir.clone().multiplyScalar(hitEnemy ? hitDist : maxDist));
  spawnTracer(from, endPoint, color);

  if (hitEnemy) {
    hitEnemy.hp -= damage;
    spawnHitSpark(hitPoint || hitEnemy.mesh.position.clone().setY(1));
    hitEnemy.hitFlash = 0.15;
    if (hitEnemy.hp <= 0) killEnemy(hitEnemy);
  }
}

function firePistol() {
  const armData = weapon.shootingArm === 0 ? pistolL : pistolR;
  weapon.shootingArm = 1 - weapon.shootingArm;
  const muzzle = getMuzzleWorld(armData);
  const dir = aimDirFromVex(muzzle, 0.04);
  hitscan(muzzle, dir, 30, 1);
  armData.userData.flash.material.opacity = 1;
  game.shakeIntensity = Math.min(game.shakeIntensity + 0.05, 0.22);
  sfxPistol();
}

function fireMinigun() {
  const muzzle = getMuzzleWorld(minigun);
  const dir = aimDirFromVex(muzzle, 0.12);
  hitscan(muzzle, dir, 30, 0.7);
  minigun.userData.flash.material.opacity = 1;
  game.shakeIntensity = Math.min(game.shakeIntensity + 0.04, 0.3);
  if (Math.random() < 0.4) spawnSmoke(muzzle);
  weapon.minigunSfxCounter = (weapon.minigunSfxCounter || 0) + 1;
  if (weapon.minigunSfxCounter % 3 === 0) sfxMinigun();
}

function swingSword() {
  sfxSword();
  const facing = game.vexFacing;
  const pos = vex.position.clone(); pos.y = 0.8;
  spawnSwordArc(facing, pos);
  game.shakeIntensity = Math.max(game.shakeIntensity, 0.2);
  // hit detection — front cone
  for (const e of game.enemies) {
    const toE = new THREE.Vector3().subVectors(e.mesh.position, vex.position);
    toE.y = 0;
    const dist = toE.length();
    if (dist > 2.8) continue;
    const angleToE = Math.atan2(toE.x, toE.z);
    let angleDiff = Math.abs(((angleToE - facing + Math.PI) % (Math.PI * 2)) - Math.PI);
    if (Number.isNaN(angleDiff)) angleDiff = 0;
    if (angleDiff < Math.PI / 2.3) {
      e.hp -= 5;
      e.hitFlash = 0.2;
      spawnHitSpark(e.mesh.position.clone().setY(1), 0xff4422);
      if (e.hp <= 0) killEnemy(e);
    }
  }
  // sword swing animation
  weapon.swordSwingTime = 0.3;
}

function killEnemy(e, cause = 'shot') {
  spawnDeathBurst(e.mesh.position.clone().setY(1));
  if (cause === 'truck') sfxSplatter();
  else sfxZombieDie();
  if (e.exploder) {
    sfxExplosion();
    spawnRadExplosion(e.mesh.position.clone().setY(1));
    const d = e.mesh.position.distanceTo(vex.position);
    if (d < 3.5) {
      if (!player.inVehicle) game.hp -= (3.5 - d) * 12;
      game.shakeIntensity = Math.max(game.shakeIntensity, 0.4);
    }
    for (const o of game.enemies) {
      if (o === e) continue;
      const od = o.mesh.position.distanceTo(e.mesh.position);
      if (od < 3.5) {
        o.hp -= (3.5 - od) * 2;
        o.hitFlash = 0.2;
      }
    }
  }
  if (e.bounty) {
    // BIG payout — bounty claimed
    sfxBounty();
    game.score += e.bounty.value;
    game.bountiesClaimed.add(e.bounty.id);
    game.bountyAlive = false;
    showBountyClaim(e.bounty);
    spawnRadExplosion(e.mesh.position.clone().setY(1));
    game.shakeIntensity = Math.max(game.shakeIntensity, 0.5);
    spawnAmmoPickup(e.mesh.position.clone());
    spawnAmmoPickup(e.mesh.position.clone().add(new THREE.Vector3(0.6, 0, -0.4)));
  } else {
    game.score += e.type === 'brute' ? 30 : (e.type === 'bomber' ? 20 : 10);
    if (Math.random() < 0.5) spawnAmmoPickup(e.mesh.position.clone());
  }
  scene.remove(e.mesh);
  game.enemies = game.enemies.filter(x => x !== e);
  updateHUD();
  if (Math.random() < 0.25) showKillFlash();
  if (Math.random() < 0.18) showVexDialogue();
}

// ==================== AMMO PICKUPS ====================
function makeAmmoPickup() {
  const g = new THREE.Group();
  const body = outlined(new THREE.BoxGeometry(0.5, 0.35, 0.55), toonMat(0x8a6a30), 1.06);
  body.position.y = 0.2;
  g.add(body);
  const band = new THREE.Mesh(new THREE.BoxGeometry(0.55, 0.06, 0.6), toonMat(0xc8a040));
  band.position.y = 0.2;
  g.add(band);
  // bullets visible on top
  for (let i = -1; i <= 1; i++) {
    const bullet = outlined(new THREE.CylinderGeometry(0.045, 0.045, 0.18, 8), toonMat(0xeec040), 1.08);
    bullet.position.set(i * 0.1, 0.45, 0);
    bullet.rotation.x = Math.PI / 2;
    g.add(bullet);
  }
  // soft glow
  const glow = new THREE.PointLight(0xf4d03f, 0.55, 3);
  glow.position.y = 0.55;
  g.add(glow);
  return g;
}

function spawnAmmoPickup(pos) {
  const p = makeAmmoPickup();
  p.position.set(pos.x, 0.05, pos.z);
  scene.add(p);
  game.pickups.push({
    mesh: p,
    bobPhase: Math.random() * Math.PI * 2,
    lifetime: 25
  });
}

// ==================== ENEMIES SPAWN ====================
function spawnEnemy() {
  let e;
  const totalToSpawn = 4 + game.wave * 2;
  const spawnedSoFar = totalToSpawn - game.enemiesToSpawn;
  const lastSpawn = game.enemiesToSpawn === 1;
  // Bounty appears mid-wave: needs at least 2 regulars first, 30% per spawn,
  // guaranteed by the last spawn slot if not yet placed.
  const shouldSpawnBounty = game.pendingBounty &&
    (lastSpawn || (spawnedSoFar >= 2 && Math.random() < 0.3));

  if (shouldSpawnBounty) {
    e = makeBountyEnemy(game.pendingBounty);
    game.pendingBounty = null;
    game.bountyAlive = true;
  } else {
    const factory = enemyFactories[Math.floor(Math.random()*enemyFactories.length)];
    e = factory();
  }
  const a = Math.random() * Math.PI * 2;
  const r = 14 + Math.random() * 4;
  e.mesh.position.set(Math.cos(a)*r, 0, Math.sin(a)*r);
  e.mesh.rotation.y = Math.random() * Math.PI * 2;
  e.mesh.scale.setScalar(e.scale);
  e.bobPhase = Math.random() * Math.PI * 2;
  e.hitFlash = 0;
  scene.add(e.mesh);
  game.enemies.push(e);
}

function startWave() {
  // pick an eligible bounty, 80% chance per wave
  const eligible = bountyRoster.filter(b =>
    b.minWave <= game.wave && !game.bountiesClaimed.has(b.id)
  );
  if (eligible.length > 0 && Math.random() < 0.8) {
    game.pendingBounty = eligible[Math.floor(Math.random() * eligible.length)];
    showWantedPoster(game.pendingBounty);
  } else {
    game.pendingBounty = null;
    showWaveBanner();
  }
  game.bountyAlive = false;
  game.enemiesToSpawn = 4 + game.wave * 2;
  // delay first spawn so poster has time to land
  game.spawnTimer = game.pendingBounty ? 2.0 : 0.4;
}
